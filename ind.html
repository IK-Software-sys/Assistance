<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Woman 3D Walker & Joint Interactor</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #ui-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 90%;
            max-width: 420px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: white;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            width: 100%;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn.active {
            background: #ff2a74;
            border-color: #ff6699;
            box-shadow: 0 0 20px rgba(255, 42, 116, 0.6);
        }

        #status-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            text-align: center;
        }

        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #1a1a2e;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            transition: opacity 0.5s ease;
        }

        /* Joint Control Panel */
        #joint-panel {
            display: none;
            position: absolute;
            top: 20px;
            right: 20px;
            width: 260px;
            background: rgba(10, 10, 20, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 20px;
            color: white;
            z-index: 20;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        #joint-panel.visible {
            display: block;
        }

        #joint-panel h3 {
            margin: 0 0 15px 0;
            font-size: 16px;
            color: #ff2a74;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }

        .slider-row {
            margin-bottom: 14px;
        }

        .slider-row label {
            display: block;
            font-size: 12px;
            margin-bottom: 5px;
            color: rgba(255,255,255,0.8);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .slider-row input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #ff2a74;
        }

        .joint-value {
            float: right;
            font-size: 11px;
            color: #ff2a74;
        }

        #walk-controls {
            display: flex;
            gap: 10px;
            width: 100%;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="loading">
        <div id="loading-text">Loading Model...</div>
    </div>

    <div id="canvas-container"></div>

    <div id="joint-panel">
        <h3 id="bone-name">Select a Joint</h3>
        <div class="slider-row">
            <label>Rotate X <span class="joint-value" id="val-x">0&deg;</span></label>
            <input type="range" id="rot-x" min="-180" max="180" value="0">
        </div>
        <div class="slider-row">
            <label>Rotate Y <span class="joint-value" id="val-y">0&deg;</span></label>
            <input type="range" id="rot-y" min="-180" max="180" value="0">
        </div>
        <div class="slider-row">
            <label>Rotate Z <span class="joint-value" id="val-z">0&deg;</span></label>
            <input type="range" id="rot-z" min="-180" max="180" value="0">
        </div>
        <button class="btn" id="reset-bone" style="margin-top:5px;">Reset Joint</button>
    </div>

    <div id="ui-container">
        <div id="status-text">Mode: Walking Animation</div>
        <button id="mode-btn" class="btn active">Switch to Joint Mode</button>
        <div id="walk-controls">
            <button id="toggle-walk" class="btn active">Walk: ON</button>
            <button id="toggle-physics" class="btn active">Physics: ON</button>
        </div>
    </div>

    <script>
        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.4, 3.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        // Floor grid for spatial reference
        const gridHelper = new THREE.GridHelper(10, 10, 0xff2a74, 0x444466);
        gridHelper.position.y = -0.01;
        scene.add(gridHelper);

        // Shadow plane
        const planeGeo = new THREE.PlaneGeometry(10, 10);
        const planeMat = new THREE.ShadowMaterial({ opacity: 0.3 });
        const plane = new THREE.Mesh(planeGeo, planeMat);
        plane.rotation.x = -Math.PI / 2;
        plane.position.y = -0.02;
        plane.receiveShadow = true;
        scene.add(plane);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        const fillLight = new THREE.DirectionalLight(0x8888ff, 0.4);
        fillLight.position.set(-5, 3, -5);
        scene.add(fillLight);

        const rimLight = new THREE.SpotLight(0xff2a74, 0.8);
        rimLight.position.set(0, 5, -5);
        rimLight.lookAt(0, 1, 0);
        scene.add(rimLight);

        // --- Controls ---
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0.9, 0);
        controls.minDistance = 1.5;
        controls.maxDistance = 8;

        // --- Global State ---
        let model = null;
        let mixer = null;
        let skeleton = null;
        let allBones = [];
        let isWalkMode = true;
        let isWalking = true;
        let isPhysicsOn = true;
        let selectedBone = null;
        let isDraggingBone = false;

        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();

        // Physics containers
        const jiggleBones = [];
        const hairChains = [];
        const walkBones = {
            leftLeg:  [null, null, null], // upper, lower, foot
            rightLeg: [null, null, null],
            leftArm:  [null, null],       // upper, lower
            rightArm: [null, null],
            spine:    null
        };

        // Joint visualizers
        const boneSphereGroup = new THREE.Group();
        scene.add(boneSphereGroup);
        const boneSpheres = [];

        // --- Loader ---
        const loader = new THREE.GLTFLoader();

        loader.load('./jel.glb', function (gltf) {
            model = gltf.scene;

            // Auto-center & scale
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scaleFactor = 1.8 / maxDim;
            model.scale.set(scaleFactor, scaleFactor, scaleFactor);

            const newBox = new THREE.Box3().setFromObject(model);
            const center = newBox.getCenter(new THREE.Vector3());
            model.position.sub(center);

            scene.add(model);

            // Extract skeleton
            let skinnedMesh = null;
            model.traverse((child) => {
                if (child.isSkinnedMesh) {
                    skinnedMesh = child;
                    skeleton = child.skeleton;
                    allBones = skeleton.bones;
                    if (child.material) {
                        child.material.roughness = 0.35;
                        child.material.metalness = 0.1;
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                }
            });

            if (allBones.length === 0) {
                document.getElementById('loading-text').innerHTML =
                    `<span style="color:#ff2a74;">No skeleton found</span><br>
                     <small>This model has no bones to animate.</small>`;
                return;
            }

            // Initialize systems
            categorizeBones();
            initJigglePhysics();
            initHairPhysics();
            createBoneSpheres();

            // Use built-in animations if available, otherwise we procedurally walk
            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(model);
                gltf.animations.forEach((clip) => {
                    mixer.clipAction(clip).play();
                });
            }

            // Camera framing
            camera.position.set(0, 1.2, 3);
            controls.target.set(0, 0.8, 0);
            controls.update();

            // Hide loader
            document.getElementById('loading').style.opacity = 0;
            setTimeout(() => document.getElementById('loading').style.display = 'none', 500);

        }, function (xhr) {
            if (xhr.total > 0) {
                const pct = Math.round((xhr.loaded / xhr.total) * 100);
                document.getElementById('loading-text').innerText = `Loading: ${pct}%`;
            }
        }, function (error) {
            console.error(error);
            document.getElementById('loading-text').innerHTML =
                `<span style="color:#ff2a74;">Error loading 'jel.glb'</span><br>
                 <small>Check file name and path.</small>`;
        });

        // --- Bone Detection ---
        function categorizeBones() {
            allBones.forEach((bone) => {
                const n = bone.name.toLowerCase();

                // Left Leg (Mixamo / Blender / MMD patterns)
                if (/leftupleg|left.*thigh|thigh.*left|thigh_l|l_thigh|upper.*leg.*l|l.*upper.*leg|\u5de6\u8db3/.test(n)) {
                    walkBones.leftLeg[0] = bone;
                } else if (/leftleg(?!.*up)|left.*calf|left.*shin|shin_l|l_shin|calf_l|l_calf|lower.*leg.*l|l.*lower.*leg|\u5de6\u3072\u3056/.test(n)) {
                    walkBones.leftLeg[1] = bone;
                } else if (/leftfoot|left.*ankle|foot_l|l_foot|ankle_l|l_ankle|\u5de6\u8db3\u9996/.test(n)) {
                    walkBones.leftLeg[2] = bone;
                }

                // Right Leg
                else if (/rightupleg|right.*thigh|thigh.*right|thigh_r|r_thigh|upper.*leg.*r|r.*upper.*leg|\u53f3\u8db3/.test(n)) {
                    walkBones.rightLeg[0] = bone;
                } else if (/rightleg(?!.*up)|right.*calf|right.*shin|shin_r|r_shin|calf_r|r_calf|lower.*leg.*r|r.*lower.*leg|\u53f3\u3072\u3056/.test(n)) {
                    walkBones.rightLeg[1] = bone;
                } else if (/rightfoot|right.*ankle|foot_r|r_foot|ankle_r|r_ankle|\u53f3\u8db3\u9996/.test(n)) {
                    walkBones.rightLeg[2] = bone;
                }

                // Left Arm
                else if (/leftarm|left.*upper.*arm|upper.*arm.*l|arm_l|l_arm|shoulder.*l|l.*shoulder|\u5de6\u8155/.test(n)) {
                    walkBones.leftArm[0] = bone;
                } else if (/leftforearm|left.*lower.*arm|lower.*arm.*l|forearm_l|l_forearm|elbow.*l|l.*elbow|\u5de6\u3072\u3058/.test(n)) {
                    walkBones.leftArm[1] = bone;
                }

                // Right Arm
                else if (/rightarm|right.*upper.*arm|upper.*arm.*r|arm_r|r_arm|shoulder.*r|r.*shoulder|\u53f3\u8155/.test(n)) {
                    walkBones.rightArm[0] = bone;
                } else if (/rightforearm|right.*lower.*arm|lower.*arm.*r|forearm_r|r_forearm|elbow.*r|r.*elbow|\u53f3\u3072\u3058/.test(n)) {
                    walkBones.rightArm[1] = bone;
                }

                // Spine / Hips
                else if (/spine|hips|waist|torso|pelvis|\u8170/.test(n) && !/hair/.test(n)) {
                    walkBones.spine = bone;
                }
            });
        }

        // --- Jiggle Physics Setup ---
        function initJigglePhysics() {
            allBones.forEach((bone) => {
                const n = bone.name.toLowerCase();
                // Breasts / Chest
                if (/breast|chest|boob|bust|j_sec_bust|\u80f8/.test(n)) {
                    jiggleBones.push({
                        bone: bone,
                        basePos: bone.position.clone(),
                        pos: bone.position.clone(),
                        vel: new THREE.Vector3(),
                        stiffness: 0.18,
                        damping: 0.82,
                        mass: 1.0
                    });
                }
                // Butt / Glutes
                if (/butt|glute|\u5c3b/.test(n)) {
                    jiggleBones.push({
                        bone: bone,
                        basePos: bone.position.clone(),
                        pos: bone.position.clone(),
                        vel: new THREE.Vector3(),
                        stiffness: 0.25,
                        damping: 0.80,
                        mass: 1.5
                    });
                }
            });
        }

        function updateJigglePhysics(time) {
            if (!isPhysicsOn) return;
            jiggleBones.forEach((jb) => {
                // Spring toward rest position
                const force = new THREE.Vector3().subVectors(jb.basePos, jb.pos).multiplyScalar(jb.stiffness);
                // Walking bounce impulse
                force.y += Math.sin(time * 8) * 0.0015 * jb.mass;
                // Add a little random sway
                force.x += Math.sin(time * 6 + jb.bone.id) * 0.0003;

                jb.vel.add(force);
                jb.vel.multiplyScalar(jb.damping);
                jb.pos.add(jb.vel);
                jb.bone.position.copy(jb.pos);
            });
        }

        // --- Hair Physics Setup ---
        function initHairPhysics() {
            // Find root hair bones
            const hairRoots = allBones.filter((b) => /hair|ponytail|twintail|bang|j_sec_hair|\u9aea/.test(b.name.toLowerCase()));
            hairRoots.forEach((root) => {
                const chain = [];
                let current = root;
                let depth = 0;
                // Follow chain down (assume linear hair chain)
                while (current && depth < 12) {
                    chain.push({
                        bone: current,
                        baseQuat: current.quaternion.clone(),
                        delay: depth * 0.15
                    });
                    if (!current.children || current.children.length === 0) break;
                    // Prefer child that also looks like hair, else take first child
                    const next = current.children.find((c) => /hair|tail|bang|\u9aea/.test(c.name.toLowerCase())) || current.children[0];
                    if (next === current) break;
                    current = next;
                    depth++;
                }
                if (chain.length > 1) hairChains.push(chain);
            });
        }

        function updateHairPhysics(time) {
            if (!isPhysicsOn) return;
            hairChains.forEach((chain) => {
                chain.forEach((link, i) => {
                    const t = time * 3 - i * 0.4;
                    // Sway amplitude increases toward tips
                    const amp = 0.04 * (i + 1);
                    const swayX = Math.sin(t) * amp;
                    const swayZ = Math.cos(t * 0.7) * amp * 0.6;

                    const swayEuler = new THREE.Euler(swayX, 0, swayZ);
                    const swayQ = new THREE.Quaternion().setFromEuler(swayEuler);
                    const targetQ = link.baseQuat.clone().multiply(swayQ);

                    link.bone.quaternion.slerp(targetQ, 0.08 + i * 0.02);
                });
            });
        }

        // --- Procedural Walking ---
        function updateProceduralWalk(time) {
            if (!isWalking || mixer) return; // Don't override mixer clips

            const speed = 5;
            const legAmp = 0.55;
            const kneeAmp = 0.45;
            const armAmp = 0.35;

            // Left Leg
            if (walkBones.leftLeg[0]) walkBones.leftLeg[0].rotation.x = Math.sin(time * speed) * legAmp;
            if (walkBones.leftLeg[1]) {
                const bend = Math.sin(time * speed + Math.PI / 2);
                walkBones.leftLeg[1].rotation.x = bend > 0 ? bend * kneeAmp : 0;
            }

            // Right Leg (opposite phase)
            if (walkBones.rightLeg[0]) walkBones.rightLeg[0].rotation.x = Math.sin(time * speed + Math.PI) * legAmp;
            if (walkBones.rightLeg[1]) {
                const bend = Math.sin(time * speed + Math.PI * 1.5);
                walkBones.rightLeg[1].rotation.x = bend > 0 ? bend * kneeAmp : 0;
            }

            // Arms (opposite to legs)
            if (walkBones.leftArm[0]) walkBones.leftArm[0].rotation.x = Math.sin(time * speed + Math.PI) * armAmp;
            if (walkBones.leftArm[1]) walkBones.leftArm[1].rotation.x = -Math.abs(Math.sin(time * speed)) * 0.15;

            if (walkBones.rightArm[0]) walkBones.rightArm[0].rotation.x = Math.sin(time * speed) * armAmp;
            if (walkBones.rightArm[1]) walkBones.rightArm[1].rotation.x = -Math.abs(Math.sin(time * speed + Math.PI)) * 0.15;

            // Spine sway & bob
            if (walkBones.spine) {
                walkBones.spine.rotation.y = Math.sin(time * speed) * 0.08;
                walkBones.spine.rotation.z = Math.sin(time * speed * 2) * 0.015;
            }

            // Whole model bob
            if (model) {
                model.position.y = Math.abs(Math.sin(time * speed)) * 0.04;
            }
        }

        // --- Joint Interaction Visuals ---
        function createBoneSpheres() {
            const geom = new THREE.SphereGeometry(0.025, 8, 8);
            allBones.forEach((bone) => {
                const mat = new THREE.MeshBasicMaterial({
                    color: 0x00ffff,
                    transparent: true,
                    opacity: 0.5,
                    depthTest: false
                });
                const sphere = new THREE.Mesh(geom, mat);
                sphere.userData.bone = bone;
                boneSphereGroup.add(sphere);
                boneSpheres.push(sphere);
            });
        }

        function updateBoneSpheres() {
            boneSpheres.forEach((sphere) => {
                const bone = sphere.userData.bone;
                const wp = new THREE.Vector3();
                bone.getWorldPosition(wp);
                sphere.position.copy(wp);
                sphere.visible = !isWalkMode;
            });
        }

        function selectBone(bone) {
            selectedBone = bone;
            // Highlight
            boneSpheres.forEach((s) => s.material.color.setHex(0x00ffff));
            const sph = boneSpheres.find((s) => s.userData.bone === bone);
            if (sph) sph.material.color.setHex(0xff2a74);

            // Show panel
            document.getElementById('joint-panel').classList.add('visible');
            document.getElementById('bone-name').innerText = bone.name;

            // Init sliders to current rotation (degrees)
            const rx = THREE.MathUtils.radToDeg(bone.rotation.x);
            const ry = THREE.MathUtils.radToDeg(bone.rotation.y);
            const rz = THREE.MathUtils.radToDeg(bone.rotation.z);

            document.getElementById('rot-x').value = Math.max(-180, Math.min(180, rx));
            document.getElementById('rot-y').value = Math.max(-180, Math.min(180, ry));
            document.getElementById('rot-z').value = Math.max(-180, Math.min(180, rz));

            updateSliderLabels(rx, ry, rz);
        }

        function deselectBone() {
            selectedBone = null;
            boneSpheres.forEach((s) => s.material.color.setHex(0x00ffff));
            document.getElementById('joint-panel').classList.remove('visible');
        }

        function updateSliderLabels(x, y, z) {
            document.getElementById('val-x').innerText = Math.round(x) + '\u00B0';
            document.getElementById('val-y').innerText = Math.round(y) + '\u00B0';
            document.getElementById('val-z').innerText = Math.round(z) + '\u00B0';
        }

        // --- UI Events ---
        const modeBtn = document.getElementById('mode-btn');
        const walkBtn = document.getElementById('toggle-walk');
        const physicsBtn = document.getElementById('toggle-physics');
        const statusText = document.getElementById('status-text');

        modeBtn.addEventListener('click', () => {
            isWalkMode = !isWalkMode;
            if (isWalkMode) {
                modeBtn.innerText = 'Switch to Joint Mode';
                statusText.innerText = 'Mode: Walking Animation';
                document.getElementById('walk-controls').style.display = 'flex';
                deselectBone();
                controls.enabled = true;
            } else {
                modeBtn.innerText = 'Switch to Walk Mode';
                statusText.innerText = 'Mode: Joint Interaction (tap spheres)';
                document.getElementById('walk-controls').style.display = 'none';
                controls.enabled = true; // Keep orbit, we'll disable briefly on bone drag
            }
        });

        walkBtn.addEventListener('click', () => {
            isWalking = !isWalking;
            walkBtn.innerText = isWalking ? 'Walk: ON' : 'Walk: OFF';
            walkBtn.classList.toggle('active', isWalking);
        });

        physicsBtn.addEventListener('click', () => {
            isPhysicsOn = !isPhysicsOn;
            physicsBtn.innerText = isPhysicsOn ? 'Physics: ON' : 'Physics: OFF';
            physicsBtn.classList.toggle('active', isPhysicsOn);
        });

        // Slider inputs
        ['x', 'y', 'z'].forEach((axis) => {
            const el = document.getElementById(`rot-${axis}`);
            el.addEventListener('input', (e) => {
                if (!selectedBone) return;
                const val = parseFloat(e.target.value);
                selectedBone.rotation[axis] = THREE.MathUtils.degToRad(val);
                updateSliderLabels(
                    parseFloat(document.getElementById('rot-x').value),
                    parseFloat(document.getElementById('rot-y').value),
                    parseFloat(document.getElementById('rot-z').value)
                );
            });
        });

        document.getElementById('reset-bone').addEventListener('click', () => {
            if (!selectedBone) return;
            selectedBone.rotation.set(0, 0, 0);
            ['x', 'y', 'z'].forEach((a) => {
                document.getElementById(`rot-${a}`).value = 0;
            });
            updateSliderLabels(0, 0, 0);
        });

        // --- Pointer / Touch Handling ---
        function updatePointer(event) {
            let cx = event.clientX;
            let cy = event.clientY;
            if (event.touches && event.touches.length > 0) {
                cx = event.touches[0].clientX;
                cy = event.touches[0].clientY;
            }
            pointer.x = (cx / window.innerWidth) * 2 - 1;
            pointer.y = -(cy / window.innerHeight) * 2 + 1;
        }

        window.addEventListener('pointerdown', (e) => {
            if (isWalkMode) return;
            updatePointer(e);
            raycaster.setFromCamera(pointer, camera);
            const hits = raycaster.intersectObjects(boneSpheres);
            if (hits.length > 0) {
                selectBone(hits[0].object.userData.bone);
                isDraggingBone = true;
                controls.enabled = false; // Don't rotate camera while grabbing joint
            } else {
                deselectBone();
            }
        });

        window.addEventListener('pointerup', () => {
            if (isDraggingBone) {
                isDraggingBone = false;
                controls.enabled = true;
            }
        });

        window.addEventListener('touchmove', (e) => {
            if (!isWalkMode) e.preventDefault();
        }, { passive: false });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            const time = clock.getElapsedTime();

            if (mixer) mixer.update(dt);

            updateProceduralWalk(time);
            updateJigglePhysics(time);
            updateHairPhysics(time);
            updateBoneSpheres();

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
