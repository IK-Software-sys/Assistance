<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jelly 3D Viewer & Interactor</title>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background: #0a0a14;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none; -webkit-user-select: none; color: #fff;
        }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }

        /* Mode Dock */
        #mode-dock {
            position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; gap: 8px;
            background: rgba(15, 15, 35, 0.75); backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 50px;
            padding: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .mode-btn {
            background: transparent; border: none; color: rgba(255,255,255,0.55);
            padding: 10px 20px; font-size: 13px; font-weight: 600; border-radius: 50px;
            cursor: pointer; transition: all 0.25s ease; text-transform: uppercase; letter-spacing: 0.5px;
            display: flex; align-items: center; gap: 6px; white-space: nowrap;
        }
        .mode-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }
        .mode-btn.active {
            background: rgba(255, 42, 116, 0.28); color: #ff85a7;
            box-shadow: 0 0 16px rgba(255,42,116,0.25), inset 0 0 10px rgba(255,42,116,0.1);
            border: 1px solid rgba(255,42,116,0.45);
        }
        .mode-btn.recording {
            animation: pulse-rec 1.5s infinite;
            background: rgba(255, 60, 60, 0.3); color: #ff9999;
            border: 1px solid rgba(255,80,80,0.5);
        }
        @keyframes pulse-rec {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,60,60,0.3); }
            50% { box-shadow: 0 0 0 12px rgba(255,60,60,0); }
        }

        #status-pill {
            position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
            z-index: 10; background: rgba(15,15,30,0.7); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 50px;
            padding: 8px 20px; font-size: 12px; color: rgba(255,255,255,0.7);
            letter-spacing: 0.5px; pointer-events: none; transition: all 0.3s;
        }

        /* Inspector */
        #inspector {
            position: absolute; top: 20px; right: 20px; width: 270px;
            background: rgba(12, 12, 28, 0.93); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 18px;
            padding: 18px; z-index: 20; box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            transform: translateX(120%); opacity: 0;
            transition: transform 0.4s cubic-bezier(0.22,1,0.36,1), opacity 0.3s;
            display: flex; flex-direction: column; gap: 12px; max-height: 90vh; overflow-y: auto;
        }
        #inspector.active { transform: translateX(0); opacity: 1; }
        #inspector::-webkit-scrollbar { width: 5px; }
        #inspector::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
        .insp-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 10px; }
        .insp-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #ff85a7; }
        .insp-close { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 20px; cursor: pointer; padding: 0 4px; line-height: 1; }
        .insp-close:hover { color: #fff; }
        .insp-section { display: none; flex-direction: column; gap: 10px; }
        .insp-section.visible { display: flex; }
        .insp-name { font-size: 15px; font-weight: 600; color: #fff; word-break: break-word; }
        .insp-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .pill-tag { font-size: 10px; padding: 3px 8px; border-radius: 20px; background: rgba(255,255,255,0.1); color: #ccc; text-transform: uppercase; }
        .pill-tag.breast { background: rgba(255, 42, 116, 0.25); color: #ff85a7; }
        .slider-group { display: flex; flex-direction: column; gap: 6px; }
        .slider-group label { font-size: 11px; color: rgba(255,255,255,0.6); display: flex; justify-content: space-between; }
        .slider-group input[type=range] {
            width: 100%; -webkit-appearance: none; height: 4px; border-radius: 2px;
            background: rgba(255,255,255,0.12); outline: none;
        }
        .slider-group input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
            background: #ff2a74; cursor: pointer; box-shadow: 0 0 10px rgba(255,42,116,0.5);
        }
        .insp-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
            color: #fff; padding: 8px 0; border-radius: 10px; font-size: 12px;
            cursor: pointer; transition: all 0.2s; width: 100%;
        }
        .insp-btn:hover { background: rgba(255,255,255,0.18); }
        .insp-btn.primary { background: rgba(255, 42, 116, 0.25); border-color: rgba(255,42,116,0.4); }
        .insp-btn.primary:hover { background: rgba(255, 42, 116, 0.4); }
        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
        .zone-toggle {
            appearance: none; width: 40px; height: 22px; background: rgba(255,255,255,0.15);
            border-radius: 11px; position: relative; cursor: pointer; outline: none; transition: background 0.2s;
        }
        .zone-toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: transform 0.2s cubic-bezier(0.22,1,0.36,1); }
        .zone-toggle:checked { background: #ff2a74; }
        .zone-toggle:checked::after { transform: translateX(18px); }

        /* Camera Preview */
        #cam-preview {
            position: absolute; bottom: 100px; right: 20px; width: 160px; height: 120px;
            border-radius: 14px; overflow: hidden; border: 2px solid rgba(255,42,116,0.4);
            background: #000; z-index: 15; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        #cam-preview.active { display: block; }
        #cam-video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #cam-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }

        #loading {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #0a0a14; z-index: 100; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; font-size: 18px;
            transition: opacity 0.5s ease;
        }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,42,116,0.2); border-top-color: #ff2a74; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <!-- MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="loading"><div class="spinner"></div><div id="loading-text">Loading Model...</div></div>
    <div id="canvas-container"></div>

    <div id="status-pill">View Mode</div>

    <div id="mode-dock">
        <button class="mode-btn active" data-mode="view">👁 View</button>
        <button class="mode-btn" data-mode="squish">✋ Squish</button>
        <button class="mode-btn" data-mode="pose">🦴 Pose</button>
        <button class="mode-btn" data-mode="zones">💧 Zones</button>
        <button class="mode-btn" id="mirror-btn">📷 Mirror</button>
    </div>

    <div id="inspector">
        <div class="insp-header"><span class="insp-title">Inspector</span><button class="insp-close" id="insp-close">×</button></div>
        <div id="insp-bone" class="insp-section">
            <div class="insp-row"><span class="insp-name" id="bone-name">Bone</span><span class="pill-tag">Joint</span></div>
            <div class="slider-group"><label>Rotate X <span id="bone-val-x">0°</span></label><input type="range" id="bone-rot-x" min="-180" max="180" value="0" step="1"></div>
            <div class="slider-group"><label>Rotate Y <span id="bone-val-y">0°</span></label><input type="range" id="bone-rot-y" min="-180" max="180" value="0" step="1"></div>
            <div class="slider-group"><label>Rotate Z <span id="bone-val-z">0°</span></label><input type="range" id="bone-rot-z" min="-180" max="180" value="0" step="1"></div>
            <button class="insp-btn" id="bone-reset-btn">Reset Joint</button>
            <button class="insp-btn primary" id="pose-reset-all">Reset All Pose</button>
        </div>
        <div id="insp-zone" class="insp-section">
            <div class="insp-row"><span class="insp-name" id="zone-name">Zone</span><span class="pill-tag breast">Breast</span></div>
            <div class="toggle-row"><span style="font-size:12px">Jiggle Enabled</span><input type="checkbox" class="zone-toggle" id="zone-active-toggle"></div>
            <div class="slider-group"><label>Stiffness <span id="zone-stiff-val">0.025</span></label><input type="range" id="zone-stiff" min="0.01" max="0.15" value="0.025" step="0.001"></div>
            <div class="slider-group"><label>Damping <span id="zone-damp-val">0.880</span></label><input type="range" id="zone-damp" min="0.5" max="0.98" value="0.88" step="0.01"></div>
            <div class="slider-group"><label>Gravity <span id="zone-grav-val">-0.0020</span></label><input type="range" id="zone-grav" min="-0.01" max="0.01" value="-0.002" step="0.0001"></div>
            <button class="insp-btn primary" id="zones-reset-btn">Reset All Zones</button>
        </div>
    </div>

    <div id="cam-preview"><video id="cam-video" playsinline muted autoplay></video><canvas id="cam-canvas"></canvas></div>

    <script>
        // --- Scene ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a14);
        scene.fog = new THREE.Fog(0x0a0a14, 8, 25);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.8, 4.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.3;
        container.appendChild(renderer.domElement);

        const gridHelper = new THREE.GridHelper(12, 12, 0xff2a74, 0x2a2a4a);
        gridHelper.position.y = -1.1; scene.add(gridHelper);

        // --- Lights ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
        keyLight.position.set(4, 8, 5); keyLight.castShadow = true; keyLight.shadow.mapSize.set(1024,1024); scene.add(keyLight);
        const fillLight = new THREE.DirectionalLight(0x88ccff, 0.4); fillLight.position.set(-4, 4, -4); scene.add(fillLight);
        const rimLight = new THREE.SpotLight(0xff2a74, 2.5, 20, Math.PI/4, 0.5, 1);
        rimLight.position.set(0, 6, -4); rimLight.lookAt(0,0,0); scene.add(rimLight);

        // --- Controls ---
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.06;
        controls.target.set(0, 0.9, 0);
        controls.minDistance = 1.5; controls.maxDistance = 10;
        controls.enablePan = true; // <-- two-finger pan restored
        controls.panSpeed = 0.8;
        controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };

        // --- State ---
        let currentMode = 'view';
        let isPointerDown = false;
        let pointer = new THREE.Vector2();
        let raycaster = new THREE.Raycaster();

        let loadedModel = null;
        let allBones = [];
        let boneMap = new Map();
        let originalBoneQuats = new Map();
        let boneUserEulers = new Map(); // uuid -> {x,y,z} degrees
        let selectedBone = null;
        let boneHelpers = [];
        let jiggleHelpers = [];
        let jellyParts = [];
        let selectedZone = null;
        let mirrorActive = false;
        let poseLandmarks = null;

        // --- Bone Name Patterns ---
        const BONE_PATTERNS = {
            hips: /hips|pelvis|root/i,
            spine: /spine|torso|back/i,
            neck: /neck/i,
            head: /head/i,
            leftUpperArm: /left.*upper.*arm|l_upperarm|l_arm|upperarm_l/i,
            leftForearm: /left.*fore.*arm|l_forearm|forearm_l/i,
            rightUpperArm: /right.*upper.*arm|r_upperarm|r_arm|upperarm_r/i,
            rightForearm: /right.*fore.*arm|r_forearm|forearm_r/i,
            leftThigh: /left.*thigh|l_thigh|l_upleg|thigh_l/i,
            leftShin: /left.*shin|l_shin|l_leg|l_lowleg|shin_l/i,
            rightThigh: /right.*thigh|r_thigh|r_upleg|thigh_r/i,
            rightShin: /right.*shin|r_shin|r_leg|r_lowleg|shin_r/i,
        };
        let namedBones = {}; // patternKey -> bone
        let boneRestVectors = new Map(); // uuid -> Vector3 (world-space direction to first child)

        // --- Jiggle ---
        const BREAST_PATTERN = /breast|boob|bust|chest|pec|mune|nipple/i;

        // --- UI Refs ---
        const statusPill = document.getElementById('status-pill');
        const inspector = document.getElementById('inspector');
        const inspBone = document.getElementById('insp-bone');
        const inspZone = document.getElementById('insp-zone');
        const mirrorBtn = document.getElementById('mirror-btn');
        const camPreview = document.getElementById('cam-preview');
        const camVideo = document.getElementById('cam-video');
        const camCanvas = document.getElementById('cam-canvas');
        const camCtx = camCanvas.getContext('2d');

        // --- Mode Switching ---
        function setMode(mode) {
            if (mode === 'mirror') return; // handled separately
            currentMode = mode;
            document.querySelectorAll('.mode-btn[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
            const labels = {
                view: 'View Mode — Orbit, Zoom & Two-Finger Pan',
                squish: 'Squish Mode — Click & drag to deform',
                pose: 'Pose Mode — Click pink joints to rotate bones',
                zones: 'Zones Mode — Click pink bubbles to configure jiggle'
            };
            statusPill.textContent = labels[mode] || 'View Mode';

            const showBones = mode === 'pose';
            const showZones = mode === 'zones';
            boneHelpers.forEach(h => { h.sphere.visible = showBones; if(h.line) h.line.visible = showBones; });
            jiggleHelpers.forEach(h => { h.mesh.visible = showZones; });

            if (mode !== 'pose' && selectedBone) deselectBone();
            if (mode !== 'zones' && selectedZone) deselectZone();
            if (mode !== 'pose' && mode !== 'zones') inspector.classList.remove('active');
            controls.enabled = (mode === 'view' || mode === 'zones' || mode === 'squish');
        }
        document.querySelectorAll('.mode-btn[data-mode]').forEach(btn => btn.addEventListener('click', () => setMode(btn.dataset.mode)));
        document.getElementById('insp-close').addEventListener('click', () => { inspector.classList.remove('active'); deselectBone(); deselectZone(); });

        // --- Load Model ---
        const loader = new THREE.GLTFLoader();
        loader.load('./Jel.glb', (gltf) => {
            const model = gltf.scene;
            loadedModel = model;

            // Process meshes
            model.traverse((child) => {
                if (child.isMesh) {
                    const mesh = child;
                    mesh.geometry = mesh.geometry.clone();
                    const posAttr = mesh.geometry.attributes.position;
                    const originalPositions = posAttr.array.slice();
                    const velocities = new Float32Array(posAttr.count * 3);
                    if (mesh.material) {
                        mesh.material = mesh.material.clone();
                        mesh.material.roughness = 0.3; mesh.material.metalness = 0.05; mesh.material.side = THREE.DoubleSide;
                        if (mesh.material.color) { mesh.material.emissive = new THREE.Color(0x1a0510); mesh.material.emissiveIntensity = 0.15; }
                    }
                    mesh.geometry.computeBoundingBox();
                    const lb = mesh.geometry.boundingBox;
                    const lCenter = new THREE.Vector3().addVectors(lb.min, lb.max).multiplyScalar(0.5);
                    const box = new THREE.Box3().setFromObject(mesh);
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const deformRadius = Math.max(maxDim * 0.35, 0.15);
                    const isBreast = BREAST_PATTERN.test(mesh.name.toLowerCase());
                    if (isBreast) {
                        jellyParts.push({
                            mesh, originalPositions, currentPositions: posAttr.array, velocities,
                            deformRadius, zoneType: 'breast', active: true,
                            localCenter: lCenter, customStiffness: null, customDamping: null, customGravity: null
                        });
                    }
                }
                if (child.isSkinnedMesh && child.skeleton) {
                    child.skeleton.bones.forEach(b => {
                        if (!boneMap.has(b.uuid)) { boneMap.set(b.uuid, b); allBones.push(b); }
                    });
                }
            });

            // Identify named bones
            for (const [key, regex] of Object.entries(BONE_PATTERNS)) {
                const found = allBones.find(b => regex.test(b.name));
                if (found) namedBones[key] = found;
            }

            // Store original quaternions & compute rest vectors
            allBones.forEach(bone => {
                originalBoneQuats.set(bone.uuid, bone.quaternion.clone());
                boneUserEulers.set(bone.uuid, { x: 0, y: 0, z: 0 });
                const children = bone.children.filter(c => c.isBone || c.type === 'Bone');
                if (children.length > 0) {
                    const start = new THREE.Vector3(); bone.getWorldPosition(start);
                    const end = new THREE.Vector3(); children[0].getWorldPosition(end);
                    boneRestVectors.set(bone.uuid, end.clone().sub(start).normalize());
                }
            });

            buildBoneHelpers();
            buildJiggleHelpers();

            // Center & Scale
            const mbox = new THREE.Box3().setFromObject(model);
            const msize = mbox.getSize(new THREE.Vector3());
            const maxDim = Math.max(msize.x, msize.y, msize.z);
            const scaleFactor = 2.2 / maxDim;
            model.scale.setScalar(scaleFactor);
            const updatedBox = new THREE.Box3().setFromObject(model);
            const updatedCenter = updatedBox.getCenter(new THREE.Vector3());
            model.position.sub(updatedCenter);
            scene.add(model);

            camera.position.set(0, 1.6, 3.8);
            controls.target.set(0, 0.9, 0); controls.update();

            document.getElementById('loading').style.opacity = 0;
            setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
        }, (xhr) => {
            if (xhr.total > 0) document.getElementById('loading-text').textContent = `Loading: ${Math.round((xhr.loaded/xhr.total)*100)}%`;
        }, (err) => {
            console.error(err);
            document.getElementById('loading-text').innerHTML = `<span style="color:#ff2a74">Error loading 'Jel.glb'</span><br><small>Check file name and path</small>`;
        });

        // --- 3D Helpers ---
        function buildBoneHelpers() {
            if (allBones.length === 0) return;
            allBones.forEach(bone => {
                const sphereGeo = new THREE.SphereGeometry(0.04, 14, 14);
                const sphereMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.85, depthTest: false });
                const sphere = new THREE.Mesh(sphereGeo, sphereMat);
                sphere.renderOrder = 1000; sphere.userData = { isBoneHelper: true, bone };
                scene.add(sphere);
                let line = null;
                if (bone.parent && boneMap.has(bone.parent.uuid)) {
                    const lineGeo = new THREE.BufferGeometry();
                    lineGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
                    const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.25, depthTest: false });
                    line = new THREE.Line(lineGeo, lineMat); line.renderOrder = 999; scene.add(line);
                }
                boneHelpers.push({ bone, sphere, line });
            });
        }
        function updateBoneHelpers() {
            boneHelpers.forEach(({ bone, sphere, line }) => {
                const pos = new THREE.Vector3(); bone.getWorldPosition(pos); sphere.position.copy(pos);
                if (line && bone.parent) {
                    const ppos = new THREE.Vector3(); bone.parent.getWorldPosition(ppos);
                    const arr = line.geometry.attributes.position.array;
                    arr[0]=ppos.x; arr[1]=ppos.y; arr[2]=ppos.z; arr[3]=pos.x; arr[4]=pos.y; arr[5]=pos.z;
                    line.geometry.attributes.position.needsUpdate = true;
                }
            });
        }

        function buildJiggleHelpers() {
            jellyParts.forEach((part, idx) => {
                const r = Math.max(part.deformRadius * 0.6, 0.08);
                const geo = new THREE.SphereGeometry(r, 20, 20);
                const mat = new THREE.MeshBasicMaterial({ color: 0xff2a74, transparent: true, opacity: 0.45, depthTest: false, side: THREE.DoubleSide });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.renderOrder = 990; mesh.userData = { isJiggleHelper: true, partIndex: idx };
                scene.add(mesh); jiggleHelpers.push({ part, mesh });
            });
        }
        function updateJiggleHelpers() {
            jiggleHelpers.forEach(({ part, mesh }) => {
                const center = part.localCenter.clone(); part.mesh.localToWorld(center); mesh.position.copy(center);
                mesh.material.opacity = part.active ? 0.45 : 0.1;
                mesh.material.color.setHex(part.active ? 0xff2a74 : 0x555555);
            });
        }

        // --- Bone Selection & Rotation ---
        function deselectBone() {
            if (!selectedBone) return;
            const h = boneHelpers.find(b => b.bone === selectedBone);
            if (h) { h.sphere.material.color.setHex(0xffffff); h.sphere.scale.setScalar(1); }
            selectedBone = null; inspBone.classList.remove('visible');
        }
        function selectBone(bone) {
            deselectBone(); deselectZone(); selectedBone = bone;
            const h = boneHelpers.find(b => b.bone === bone);
            if (h) { h.sphere.material.color.setHex(0xff2a74); h.sphere.scale.setScalar(1.8); }
            const user = boneUserEulers.get(bone.uuid) || {x:0,y:0,z:0};
            document.getElementById('bone-name').textContent = bone.name || 'Joint';
            document.getElementById('bone-rot-x').value = user.x; document.getElementById('bone-rot-y').value = user.y; document.getElementById('bone-rot-z').value = user.z;
            updateBoneSliderLabels(user.x, user.y, user.z);
            inspZone.classList.remove('visible'); inspBone.classList.add('visible'); inspector.classList.add('active');
        }
        function updateBoneSliderLabels(x,y,z) {
            document.getElementById('bone-val-x').textContent = x + '°';
            document.getElementById('bone-val-y').textContent = y + '°';
            document.getElementById('bone-val-z').textContent = z + '°';
        }

        // Quaternion-based rotation with proper FK hierarchy
        function applyBoneRotation() {
            if (!selectedBone) return;
            const rx = parseFloat(document.getElementById('bone-rot-x').value);
            const ry = parseFloat(document.getElementById('bone-rot-y').value);
            const rz = parseFloat(document.getElementById('bone-rot-z').value);
            boneUserEulers.set(selectedBone.uuid, {x:rx, y:ry, z:rz});
            updateBoneSliderLabels(rx, ry, rz);
            const orig = originalBoneQuats.get(selectedBone.uuid);
            const euler = new THREE.Euler(rx * Math.PI/180, ry * Math.PI/180, rz * Math.PI/180, 'XYZ');
            const userQ = new THREE.Quaternion().setFromEuler(euler);
            selectedBone.quaternion.copy(orig).multiply(userQ); // local rotation on top of original
            selectedBone.updateMatrixWorld(true);
            if (loadedModel) loadedModel.updateMatrixWorld(true);
        }
        ['bone-rot-x','bone-rot-y','bone-rot-z'].forEach(id => document.getElementById(id).addEventListener('input', applyBoneRotation));

        document.getElementById('bone-reset-btn').addEventListener('click', () => {
            if (!selectedBone) return;
            boneUserEulers.set(selectedBone.uuid, {x:0,y:0,z:0});
            ['bone-rot-x','bone-rot-y','bone-rot-z'].forEach(id => document.getElementById(id).value = 0);
            updateBoneSliderLabels(0,0,0);
            selectedBone.quaternion.copy(originalBoneQuats.get(selectedBone.uuid));
            selectedBone.updateMatrixWorld(true);
            if (loadedModel) loadedModel.updateMatrixWorld(true);
        });
        document.getElementById('pose-reset-all').addEventListener('click', () => {
            allBones.forEach(b => {
                boneUserEulers.set(b.uuid, {x:0,y:0,z:0});
                b.quaternion.copy(originalBoneQuats.get(b.uuid));
            });
            if (loadedModel) loadedModel.updateMatrixWorld(true);
            if (selectedBone) { ['bone-rot-x','bone-rot-y','bone-rot-z'].forEach(id => document.getElementById(id).value = 0); updateBoneSliderLabels(0,0,0); }
        });

        // --- Zone Selection ---
        function deselectZone() { selectedZone = null; inspZone.classList.remove('visible'); }
        function selectZone(part) {
            deselectBone(); deselectZone(); selectedZone = part;
            document.getElementById('zone-name').textContent = part.mesh.name || 'Breast Zone';
            document.getElementById('zone-active-toggle').checked = part.active;
            document.getElementById('zone-stiff').value = part.customStiffness ?? 0.025;
            document.getElementById('zone-damp').value = part.customDamping ?? 0.88;
            document.getElementById('zone-grav').value = part.customGravity ?? -0.002;
            updateZoneSliderLabels();
            inspBone.classList.remove('visible'); inspZone.classList.add('visible'); inspector.classList.add('active');
        }
        function updateZoneSliderLabels() {
            document.getElementById('zone-stiff-val').textContent = parseFloat(document.getElementById('zone-stiff').value).toFixed(3);
            document.getElementById('zone-damp-val').textContent = parseFloat(document.getElementById('zone-damp').value).toFixed(2);
            document.getElementById('zone-grav-val').textContent = parseFloat(document.getElementById('zone-grav').value).toFixed(4);
        }
        function applyZoneSettings() {
            if (!selectedZone) return;
            selectedZone.active = document.getElementById('zone-active-toggle').checked;
            selectedZone.customStiffness = parseFloat(document.getElementById('zone-stiff').value);
            selectedZone.customDamping = parseFloat(document.getElementById('zone-damp').value);
            selectedZone.customGravity = parseFloat(document.getElementById('zone-grav').value);
            updateZoneSliderLabels();
        }
        ['zone-stiff','zone-damp','zone-grav'].forEach(id => document.getElementById(id).addEventListener('input', applyZoneSettings));
        document.getElementById('zone-active-toggle').addEventListener('change', applyZoneSettings);
        document.getElementById('zones-reset-btn').addEventListener('click', () => {
            jellyParts.forEach(p => { p.active = true; p.customStiffness = null; p.customDamping = null; p.customGravity = null; });
            if (selectedZone) { document.getElementById('zone-active-toggle').checked = true; document.getElementById('zone-stiff').value = 0.025; document.getElementById('zone-damp').value = 0.88; document.getElementById('zone-grav').value = -0.002; updateZoneSliderLabels(); }
        });

        // --- Pointer / Raycasting ---
        function updatePointer(e) {
            let cx = e.clientX, cy = e.clientY;
            if (e.touches && e.touches.length > 0) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
            pointer.x = (cx / window.innerWidth) * 2 - 1; pointer.y = -(cy / window.innerHeight) * 2 + 1;
        }
        function onPointerDown(e) {
            if (e.target.closest('#mode-dock') || e.target.closest('#inspector') || e.target.closest('#cam-preview')) return;
            isPointerDown = true; updatePointer(e);
            if (currentMode === 'pose') {
                raycaster.setFromCamera(pointer, camera);
                const hits = raycaster.intersectObjects(boneHelpers.map(b => b.sphere));
                if (hits.length > 0) { selectBone(hits[0].object.userData.bone); e.preventDefault(); return; }
            }
            if (currentMode === 'zones') {
                raycaster.setFromCamera(pointer, camera);
                const hits = raycaster.intersectObjects(jiggleHelpers.map(j => j.mesh));
                if (hits.length > 0) { selectZone(jellyParts[hits[0].object.userData.partIndex]); e.preventDefault(); return; }
            }
            if (currentMode === 'squish') deformJelly();
        }
        function onPointerMove(e) {
            updatePointer(e);
            if (currentMode === 'squish' && isPointerDown) deformJelly();
            if (currentMode === 'pose') {
                raycaster.setFromCamera(pointer, camera);
                const hits = raycaster.intersectObjects(boneHelpers.map(b => b.sphere));
                document.body.style.cursor = hits.length > 0 ? 'pointer' : 'default';
            } else if (currentMode === 'zones') {
                raycaster.setFromCamera(pointer, camera);
                const hits = raycaster.intersectObjects(jiggleHelpers.map(j => j.mesh));
                document.body.style.cursor = hits.length > 0 ? 'pointer' : 'default';
                jiggleHelpers.forEach(j => j.mesh.scale.setScalar(1));
                if (hits.length > 0) hits[0].object.scale.setScalar(1.3);
            } else document.body.style.cursor = 'default';
        }
        window.addEventListener('pointerdown', onPointerDown);
        window.addEventListener('pointermove', onPointerMove);
        window.addEventListener('pointerup', () => isPointerDown = false);
        window.addEventListener('touchmove', e => { if (currentMode === 'squish') e.preventDefault(); }, { passive: false });

        // --- Deformation ---
        function deformJelly() {
            if (jellyParts.length === 0) return;
            raycaster.setFromCamera(pointer, camera);
            const hits = raycaster.intersectObjects(jellyParts.map(p => p.mesh));
            if (hits.length > 0) {
                const hit = hits[0]; const targetMesh = hit.object;
                const localHit = targetMesh.worldToLocal(hit.point.clone()); const strength = 0.5;
                jellyParts.forEach(part => {
                    if (part.mesh !== targetMesh) return;
                    const { currentPositions, velocities, deformRadius } = part; const rSq = deformRadius * deformRadius;
                    for (let i = 0; i < currentPositions.length / 3; i++) {
                        const idx = i * 3;
                        const dx = currentPositions[idx] - localHit.x; const dy = currentPositions[idx+1] - localHit.y; const dz = currentPositions[idx+2] - localHit.z;
                        const distSq = dx*dx + dy*dy + dz*dz;
                        if (distSq < rSq) {
                            const dist = Math.sqrt(distSq); const falloff = (1 - dist / deformRadius) * strength;
                            velocities[idx] += dx * falloff; velocities[idx+1] += dy * falloff; velocities[idx+2] += dz * falloff;
                        }
                    }
                });
            }
        }

        // --- MediaPipe Mirror ---
        let mpPose = null;
        let camStream = null;
        let mirrorFrameId = null;

        mirrorBtn.addEventListener('click', async () => {
            if (mirrorActive) { stopMirror(); return; }
            startMirror();
        });

        async function startMirror() {
            mirrorActive = true; mirrorBtn.classList.add('recording');
            mirrorBtn.innerHTML = '⏹ Stop'; statusPill.textContent = 'Mirror Mode — Copying your pose...';
            camPreview.classList.add('active');
            try {
                camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 } });
                camVideo.srcObject = camStream; await camVideo.play();
                camCanvas.width = 640; camCanvas.height = 480;

                mpPose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
                mpPose.setOptions({ modelComplexity: 1, smoothLandmarks: true, enableSegmentation: false, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
                mpPose.onResults(onMirrorResults);

                async function loop() {
                    if (!mirrorActive) return;
                    await mpPose.send({ image: camVideo });
                    mirrorFrameId = requestAnimationFrame(loop);
                }
                loop();
            } catch (err) {
                console.error(err); alert('Camera access denied or not available.'); stopMirror();
            }
        }

        function stopMirror() {
            mirrorActive = false; mirrorBtn.classList.remove('recording');
            mirrorBtn.innerHTML = '📷 Mirror'; setMode(currentMode);
            camPreview.classList.remove('active');
            if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
            if (mirrorFrameId) cancelAnimationFrame(mirrorFrameId);
            mpPose = null; camVideo.srcObject = null;
            // Reset pose
            allBones.forEach(b => { b.quaternion.copy(originalBoneQuats.get(b.uuid)); boneUserEulers.set(b.uuid, {x:0,y:0,z:0}); });
            if (loadedModel) loadedModel.updateMatrixWorld(true);
        }

        function onMirrorResults(results) {
            if (!results.poseLandmarks) return;
            const lm = results.poseLandmarks;
            poseLandmarks = lm;

            // Draw preview skeleton
            camCtx.save(); camCtx.clearRect(0,0,640,480); camCtx.scale(-1,1); camCtx.translate(-640,0);
            drawConnectors(camCtx, lm, Pose.POSE_CONNECTIONS, {color:'#ff2a74', lineWidth:3});
            drawLandmarks(camCtx, lm, {color:'#ffffff', lineWidth:1, radius:3});
            camCtx.restore();

            applyMediaPipePose(lm);
        }

        // Convert MP landmark to Three-like vector (flip Y, center-ish)
        function lmVec(idx) {
            const l = poseLandmarks[idx];
            return new THREE.Vector3(l.x, -l.y, l.z); // Y flipped for 3D space
        }
        function dir(aIdx, bIdx) {
            return lmVec(bIdx).sub(lmVec(aIdx)).normalize();
        }
        function visible(idx) { return poseLandmarks[idx].visibility > 0.5; }

        function applyMediaPipePose(lm) {
            if (!loadedModel || allBones.length === 0) return;
            poseLandmarks = lm;

            // Helper: rotate bone to match target direction
            function orientBone(boneKey, fromIdx, toIdx, fallbackAxis) {
                const bone = namedBones[boneKey];
                if (!bone) return;
                if (!visible(fromIdx) || !visible(toIdx)) return;
                const restVec = boneRestVectors.get(bone.uuid);
                if (!restVec) return;
                const targetVec = dir(fromIdx, toIdx);
                // Get parent world quaternion
                const parentQuat = new THREE.Quaternion();
                if (bone.parent) bone.parent.getWorldQuaternion(parentQuat);
                const parentQuatInv = parentQuat.clone().invert();
                const localRest = restVec.clone().applyQuaternion(parentQuatInv);
                const localTarget = targetVec.clone().applyQuaternion(parentQuatInv);
                const targetQ = new THREE.Quaternion().setFromUnitVectors(localRest, localTarget);
                bone.quaternion.slerp(targetQ, 0.18);
            }

            // Hips / Root: orient by hip line and spine direction
            if (namedBones.hips && visible(23) && visible(24) && visible(11) && visible(12)) {
                const hipL = lmVec(23), hipR = lmVec(24), shoulderL = lmVec(11), shoulderR = lmVec(12);
                const hipCenter = new THREE.Vector3().addVectors(hipL, hipR).multiplyScalar(0.5);
                const shoulderCenter = new THREE.Vector3().addVectors(shoulderL, shoulderR).multiplyScalar(0.5);
                const spineDir = shoulderCenter.clone().sub(hipCenter).normalize();
                const hipLine = hipR.clone().sub(hipL).normalize();
                const up = new THREE.Vector3(0,1,0);
                // Build a target quaternion from spineDir and hipLine
                const targetQ = new THREE.Quaternion().setFromUnitVectors(up, spineDir);
                // Also account for twist from hip line... simplified
                namedBones.hips.quaternion.slerp(targetQ, 0.15);
            }

            // Spine (simplified: shoulder center to hip center)
            if (namedBones.spine && visible(23) && visible(24) && visible(11) && visible(12)) {
                const hipCenter = new THREE.Vector3().addVectors(lmVec(23), lmVec(24)).multiplyScalar(0.5);
                const shoulderCenter = new THREE.Vector3().addVectors(lmVec(11), lmVec(12)).multiplyScalar(0.5);
                const restVec = boneRestVectors.get(namedBones.spine.uuid);
                if (restVec) {
                    const targetVec = shoulderCenter.clone().sub(hipCenter).normalize();
                    const parentQuat = new THREE.Quaternion();
                    if (namedBones.spine.parent) namedBones.spine.parent.getWorldQuaternion(parentQuat);
                    const localRest = restVec.clone().applyQuaternion(parentQuat.clone().invert());
                    const localTarget = targetVec.clone().applyQuaternion(parentQuat.clone().invert());
                    namedBones.spine.quaternion.slerp(new THREE.Quaternion().setFromUnitVectors(localRest, localTarget), 0.18);
                }
            }

            // Arms
            orientBone('leftUpperArm', 11, 13);
            orientBone('leftForearm', 13, 15);
            orientBone('rightUpperArm', 12, 14);
            orientBone('rightForearm', 14, 16);

            // Legs
            orientBone('leftThigh', 23, 25);
            orientBone('leftShin', 25, 27);
            orientBone('rightThigh', 24, 26);
            orientBone('rightShin', 26, 28);

            // Head / Neck
            if (namedBones.neck && visible(11) && visible(12) && visible(0)) {
                const shoulderCenter = new THREE.Vector3().addVectors(lmVec(11), lmVec(12)).multiplyScalar(0.5);
                const targetVec = lmVec(0).clone().sub(shoulderCenter).normalize();
                const restVec = boneRestVectors.get(namedBones.neck.uuid);
                if (restVec) {
                    const parentQuat = new THREE.Quaternion();
                    if (namedBones.neck.parent) namedBones.neck.parent.getWorldQuaternion(parentQuat);
                    const localRest = restVec.clone().applyQuaternion(parentQuat.clone().invert());
                    const localTarget = targetVec.clone().applyQuaternion(parentQuat.clone().invert());
                    namedBones.neck.quaternion.slerp(new THREE.Quaternion().setFromUnitVectors(localRest, localTarget), 0.15);
                }
            }

            // Update hierarchy
            if (namedBones.hips) namedBones.hips.updateMatrixWorld(true);
            else if (loadedModel) loadedModel.updateMatrixWorld(true);
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();

            if (loadedModel) { updateBoneHelpers(); updateJiggleHelpers(); }

            // Breast jiggle physics only
            jellyParts.forEach(part => {
                const { mesh, originalPositions, currentPositions, velocities, active } = part;
                const posAttr = mesh.geometry.attributes.position;
                if (!active) {
                    let dirty = false;
                    for (let i = 0; i < posAttr.count; i++) {
                        const idx = i*3;
                        const dx = originalPositions[idx] - currentPositions[idx];
                        const dy = originalPositions[idx+1] - currentPositions[idx+1];
                        const dz = originalPositions[idx+2] - currentPositions[idx+2];
                        if (Math.abs(dx)>0.001 || Math.abs(dy)>0.001 || Math.abs(dz)>0.001) {
                            velocities[idx]=dx*0.08; velocities[idx+1]=dy*0.08; velocities[idx+2]=dz*0.08;
                            currentPositions[idx]+=velocities[idx]; currentPositions[idx+1]+=velocities[idx+1]; currentPositions[idx+2]+=velocities[idx+2]; dirty=true;
                        } else { velocities[idx]=velocities[idx+1]=velocities[idx+2]=0; currentPositions[idx]=originalPositions[idx]; currentPositions[idx+1]=originalPositions[idx+1]; currentPositions[idx+2]=originalPositions[idx+2]; }
                    }
                    if (dirty) { posAttr.needsUpdate = true; mesh.geometry.computeVertexNormals(); }
                    return;
                }
                let stiffness = part.customStiffness ?? 0.025;
                let damping = part.customDamping ?? 0.88;
                let gravity = part.customGravity ?? -0.002;
                for (let i = 0; i < posAttr.count; i++) {
                    const idx = i*3;
                    const dx = originalPositions[idx] - currentPositions[idx];
                    const dy = originalPositions[idx+1] - currentPositions[idx+1];
                    const dz = originalPositions[idx+2] - currentPositions[idx+2];
                    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
                    const nonlinear = 1.0 + dist * 2.0;
                    let fx = dx * stiffness * nonlinear;
                    let fy = dy * stiffness * nonlinear + gravity;
                    let fz = dz * stiffness * nonlinear;
                    velocities[idx] = (velocities[idx] + fx) * damping;
                    velocities[idx+1] = (velocities[idx+1] + fy) * damping;
                    velocities[idx+2] = (velocities[idx+2] + fz) * damping;
                    currentPositions[idx] += velocities[idx];
                    currentPositions[idx+1] += velocities[idx+1];
                    currentPositions[idx+2] += velocities[idx+2];
                }
                posAttr.needsUpdate = true; mesh.geometry.computeVertexNormals();
            });

            if (!mirrorActive && (currentMode === 'view' || currentMode === 'zones' || currentMode === 'squish')) controls.update();
            renderer.render(scene, camera);
        }
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        });
        animate();
    </script>
</body>
