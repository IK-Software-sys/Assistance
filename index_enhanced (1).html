<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jelly 3D Viewer & Interactor</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0f0f1a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            color: #fff;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* --- Mode Dock --- */
        #mode-dock {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 10px;
            background: rgba(20, 20, 40, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 50px;
            padding: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .mode-btn {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.6);
            padding: 10px 22px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .mode-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }
        .mode-btn.active {
            background: rgba(255, 42, 116, 0.25);
            color: #ff85a7;
            box-shadow: 0 0 16px rgba(255, 42, 116, 0.25), inset 0 0 10px rgba(255,42,116,0.1);
            border: 1px solid rgba(255, 42, 116, 0.4);
        }

        #status-pill {
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(15, 15, 30, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 8px 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            letter-spacing: 0.5px;
            pointer-events: none;
            transition: all 0.3s;
        }

        /* --- Inspector Panel --- */
        #inspector {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 270px;
            background: rgba(15, 15, 35, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 18px;
            padding: 18px;
            z-index: 20;
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            transform: translateX(120%);
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.22,1,0.36,1), opacity 0.3s;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 90vh;
            overflow-y: auto;
        }
        #inspector.active { transform: translateX(0); opacity: 1; }
        #inspector::-webkit-scrollbar { width: 5px; }
        #inspector::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

        .insp-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 10px;
        }
        .insp-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ff85a7;
        }
        .insp-close {
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
        }
        .insp-close:hover { color: #fff; }

        .insp-body { display: flex; flex-direction: column; gap: 14px; }

        .insp-section { display: none; }
        .insp-section.visible { display: flex; flex-direction: column; gap: 10px; }

        .insp-label {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            display: flex;
            justify-content: space-between;
        }

        .insp-name {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            word-break: break-word;
        }

        .insp-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .pill-tag {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            color: #ccc;
            text-transform: uppercase;
        }
        .pill-tag.breast { background: rgba(255, 42, 116, 0.25); color: #ff85a7; }
        .pill-tag.muscle { background: rgba(0, 170, 255, 0.2); color: #66ccff; }
        .pill-tag.soft { background: rgba(255, 204, 0, 0.2); color: #ffdd66; }

        .slider-group { display: flex; flex-direction: column; gap: 6px; }
        .slider-group label {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            display: flex;
            justify-content: space-between;
        }
        .slider-group input[type=range] {
            width: 100%;
            -webkit-appearance: none;
            height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.12);
            outline: none;
        }
        .slider-group input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ff2a74;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255,42,116,0.5);
            transition: transform 0.1s;
        }
        .slider-group input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }

        .insp-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            padding: 8px 0;
            border-radius: 10px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }
        .insp-btn:hover { background: rgba(255,255,255,0.18); }
        .insp-btn.primary { background: rgba(255, 42, 116, 0.25); border-color: rgba(255,42,116,0.4); }
        .insp-btn.primary:hover { background: rgba(255, 42, 116, 0.4); }

        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
        }
        .zone-toggle {
            appearance: none;
            width: 40px;
            height: 22px;
            background: rgba(255,255,255,0.15);
            border-radius: 11px;
            position: relative;
            cursor: pointer;
            outline: none;
            transition: background 0.2s;
        }
        .zone-toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s cubic-bezier(0.22,1,0.36,1);
        }
        .zone-toggle:checked { background: #ff2a74; }
        .zone-toggle:checked::after { transform: translateX(18px); }

        #loading {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #0f0f1a;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 18px;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,42,116,0.2);
            border-top-color: #ff2a74;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <div id="loading-text">Loading Model...</div>
    </div>

    <div id="canvas-container"></div>

    <div id="status-pill">View Mode</div>

    <div id="mode-dock">
        <button class="mode-btn active" data-mode="view">👁 View</button>
        <button class="mode-btn" data-mode="squish">✋ Squish</button>
        <button class="mode-btn" data-mode="pose">🦴 Pose</button>
        <button class="mode-btn" data-mode="zones">💧 Zones</button>
    </div>

    <!-- Inspector Panel -->
    <div id="inspector">
        <div class="insp-header">
            <span class="insp-title">Inspector</span>
            <button class="insp-close" id="insp-close">×</button>
        </div>
        <div class="insp-body">
            <!-- Bone Section -->
            <div class="insp-section" id="insp-bone">
                <div class="insp-row">
                    <span class="insp-name" id="bone-name">Bone</span>
                    <span class="pill-tag">Joint</span>
                </div>
                <div class="slider-group">
                    <label>Rotate X <span id="bone-val-x">0°</span></label>
                    <input type="range" id="bone-rot-x" min="-180" max="180" value="0" step="1">
                </div>
                <div class="slider-group">
                    <label>Rotate Y <span id="bone-val-y">0°</span></label>
                    <input type="range" id="bone-rot-y" min="-180" max="180" value="0" step="1">
                </div>
                <div class="slider-group">
                    <label>Rotate Z <span id="bone-val-z">0°</span></label>
                    <input type="range" id="bone-rot-z" min="-180" max="180" value="0" step="1">
                </div>
                <button class="insp-btn" id="bone-reset-btn">Reset Joint</button>
                <button class="insp-btn primary" id="pose-reset-all">Reset All Pose</button>
            </div>

            <!-- Zone Section -->
            <div class="insp-section" id="insp-zone">
                <div class="insp-row">
                    <span class="insp-name" id="zone-name">Zone</span>
                    <span class="pill-tag" id="zone-tag">Soft</span>
                </div>
                <div class="toggle-row">
                    <span style="font-size:12px">Jiggle Enabled</span>
                    <input type="checkbox" class="zone-toggle" id="zone-active-toggle">
                </div>
                <div class="slider-group">
                    <label>Stiffness <span id="zone-stiff-val">Auto</span></label>
                    <input type="range" id="zone-stiff" min="0.01" max="0.15" value="0.04" step="0.001">
                </div>
                <div class="slider-group">
                    <label>Damping <span id="zone-damp-val">Auto</span></label>
                    <input type="range" id="zone-damp" min="0.5" max="0.98" value="0.84" step="0.01">
                </div>
                <div class="slider-group">
                    <label>Gravity <span id="zone-grav-val">Auto</span></label>
                    <input type="range" id="zone-grav" min="-0.01" max="0.01" value="0" step="0.0001">
                </div>
                <button class="insp-btn primary" id="zones-reset-btn">Reset All Zones</button>
            </div>
        </div>
    </div>

    <script>
        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f0f1a);
        scene.fog = new THREE.Fog(0x0f0f1a, 8, 25);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.8, 4.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3;
        container.appendChild(renderer.domElement);

        const gridHelper = new THREE.GridHelper(12, 12, 0xff2a74, 0x2a2a4a);
        gridHelper.position.y = -1.1;
        scene.add(gridHelper);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
        keyLight.position.set(4, 8, 5);
        keyLight.castShadow = true;
        keyLight.shadow.mapSize.set(1024,1024);
        scene.add(keyLight);

        const fillLight = new THREE.DirectionalLight(0x88ccff, 0.4);
        fillLight.position.set(-4, 4, -4);
        scene.add(fillLight);

        const rimLight = new THREE.SpotLight(0xff2a74, 2.5, 20, Math.PI/4, 0.5, 1);
        rimLight.position.set(0, 6, -4);
        rimLight.lookAt(0,0,0);
        scene.add(rimLight);

        // --- Controls ---
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.target.set(0, 0.8, 0);
        controls.minDistance = 1.5;
        controls.maxDistance = 10;
        controls.enablePan = false;

        // --- State ---
        let currentMode = 'view';
        let isPointerDown = false;
        let pointer = new THREE.Vector2();
        let raycaster = new THREE.Raycaster();

        let loadedModel = null;
        let allBones = [];
        let boneMap = new Map();
        let originalBoneRotations = new Map();
        let boneUserRotations = new Map();
        let selectedBone = null;

        let jellyParts = [];
        let selectedZone = null;

        // 3D Helpers
        const boneHelpers = []; // { bone, sphere, line }
        const jiggleHelpers = []; // { part, mesh }
        const helperGroup = new THREE.Group();
        scene.add(helperGroup);

        // --- Name Patterns ---
        const JIGGLE_PATTERNS = {
            breast: /breast|boob|bust|chest|pec|torso_front|mune|nipple/i,
            muscle: /muscle|bicep|tricep|delt|quad|glute|butt|thigh|calf|arm|leg|forearm/i,
            soft: /belly|stomach|tummy|waist|hip|love|handle/i
        };
        const ZONE_COLORS = { breast: 0xff2a74, muscle: 0x00aaff, soft: 0xffcc00 };

        // --- UI Refs ---
        const statusPill = document.getElementById('status-pill');
        const inspector = document.getElementById('inspector');
        const inspBone = document.getElementById('insp-bone');
        const inspZone = document.getElementById('insp-zone');

        // --- Mode Switching ---
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
            const labels = {
                view: 'View Mode — Orbit & Zoom',
                squish: 'Squish Mode — Click & drag to deform',
                pose: 'Pose Mode — Click pink joints to rotate bones',
                zones: 'Zones Mode — Click colored bubbles to toggle jiggle'
            };
            statusPill.textContent = labels[mode];

            // Update helper visibility
            const showBones = mode === 'pose';
            const showZones = mode === 'zones';
            boneHelpers.forEach(h => {
                h.sphere.visible = showBones;
                if(h.line) h.line.visible = showBones;
            });
            jiggleHelpers.forEach(h => {
                h.mesh.visible = showZones;
            });

            // Clear selection if leaving relevant mode
            if (mode !== 'pose' && selectedBone) deselectBone();
            if (mode !== 'zones' && selectedZone) deselectZone();
            if (mode !== 'pose' && mode !== 'zones') inspector.classList.remove('active');

            controls.enabled = (mode === 'view' || mode === 'zones');
        }

        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => setMode(btn.dataset.mode));
        });

        document.getElementById('insp-close').addEventListener('click', () => {
            inspector.classList.remove('active');
            if (selectedBone) deselectBone();
            if (selectedZone) deselectZone();
        });

        // --- Loader ---
        const loader = new THREE.GLTFLoader();
        loader.load('./Jel.glb', (gltf) => {
            const model = gltf.scene;
            loadedModel = model;

            // 1. Process meshes & physics
            model.traverse((child) => {
                if (child.isMesh) {
                    const mesh = child;
                    mesh.geometry = mesh.geometry.clone();
                    const posAttr = mesh.geometry.attributes.position;
                    const originalPositions = posAttr.array.slice();
                    const velocities = new Float32Array(posAttr.count * 3);

                    if (mesh.material) {
                        mesh.material = mesh.material.clone();
                        mesh.material.roughness = 0.3;
                        mesh.material.metalness = 0.05;
                        mesh.material.side = THREE.DoubleSide;
                        if (mesh.material.color) {
                            mesh.material.emissive = new THREE.Color(0x1a0510);
                            mesh.material.emissiveIntensity = 0.15;
                        }
                    }

                    const box = new THREE.Box3().setFromObject(mesh);
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const localCenter = new THREE.Vector3();
                    box.getCenter(localCenter);
                    // localCenter is in mesh local space? setFromObject uses world space. Need local.
                    // Recompute in local space using geometry bounding box
                    mesh.geometry.computeBoundingBox();
                    const lb = mesh.geometry.boundingBox;
                    const lCenter = new THREE.Vector3().addVectors(lb.min, lb.max).multiplyScalar(0.5);

                    const deformRadius = Math.max(maxDim * 0.35, 0.15);

                    const meshName = mesh.name.toLowerCase();
                    let zoneType = 'none';
                    for (const [type, regex] of Object.entries(JIGGLE_PATTERNS)) {
                        if (regex.test(meshName)) { zoneType = type; break; }
                    }

                    const part = {
                        mesh, originalPositions, currentPositions: posAttr.array,
                        velocities, deformRadius, zoneType, active: zoneType !== 'none',
                        localCenter: lCenter,
                        customStiffness: null, customDamping: null, customGravity: null
                    };
                    jellyParts.push(part);
                }

                // Collect bones from skinned meshes
                if (child.isSkinnedMesh && child.skeleton) {
                    child.skeleton.bones.forEach(b => {
                        if (!boneMap.has(b.uuid)) {
                            boneMap.set(b.uuid, b);
                            allBones.push(b);
                        }
                    });
                }
            });

            // 2. Build 3D Skeleton Visuals
            buildBoneHelpers();

            // 3. Build Jiggle Zone Visuals
            buildJiggleHelpers();

            // 4. Center & Scale Model
            const mbox = new THREE.Box3().setFromObject(model);
            const msize = mbox.getSize(new THREE.Vector3());
            const mcenter = mbox.getCenter(new THREE.Vector3());
            const maxDim = Math.max(msize.x, msize.y, msize.z);
            const scaleFactor = 2.2 / maxDim;
            model.scale.setScalar(scaleFactor);

            const updatedBox = new THREE.Box3().setFromObject(model);
            const updatedCenter = updatedBox.getCenter(new THREE.Vector3());
            model.position.sub(updatedCenter);

            scene.add(model);
            camera.position.set(0, 1.6, 3.8);
            controls.target.set(0, 0.9, 0);
            controls.update();

            document.getElementById('loading').style.opacity = 0;
            setTimeout(() => document.getElementById('loading').style.display = 'none', 500);

        }, (xhr) => {
            if (xhr.total > 0) {
                document.getElementById('loading-text').textContent = `Loading: ${Math.round((xhr.loaded/xhr.total)*100)}%`;
            }
        }, (err) => {
            console.error(err);
            document.getElementById('loading-text').innerHTML = `<span style="color:#ff2a74">Error loading 'Jel.glb'</span><br><small>Check file name and path</small>`;
        });

        // --- Bone Helpers ---
        function buildBoneHelpers() {
            if (allBones.length === 0) return;
            allBones.forEach(bone => {
                originalBoneRotations.set(bone.uuid, bone.rotation.clone());
                boneUserRotations.set(bone.uuid, {x:0,y:0,z:0});

                const sphereGeo = new THREE.SphereGeometry(0.035, 12, 12);
                const sphereMat = new THREE.MeshBasicMaterial({
                    color: 0xffffff, transparent: true, opacity: 0.85, depthTest: false
                });
                const sphere = new THREE.Mesh(sphereGeo, sphereMat);
                sphere.renderOrder = 1000;
                sphere.userData = { isBoneHelper: true, bone: bone };
                scene.add(sphere);

                let line = null;
                if (bone.parent && boneMap.has(bone.parent.uuid)) {
                    const lineGeo = new THREE.BufferGeometry();
                    const positions = new Float32Array(6);
                    lineGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                    const lineMat = new THREE.LineBasicMaterial({
                        color: 0xffffff, transparent: true, opacity: 0.25, depthTest: false
                    });
                    line = new THREE.Line(lineGeo, lineMat);
                    line.renderOrder = 999;
                    scene.add(line);
                }

                boneHelpers.push({ bone, sphere, line });
            });
        }

        function updateBoneHelpers() {
            boneHelpers.forEach(({ bone, sphere, line }) => {
                const pos = new THREE.Vector3();
                bone.getWorldPosition(pos);
                sphere.position.copy(pos);
                if (line && bone.parent) {
                    const ppos = new THREE.Vector3();
                    bone.parent.getWorldPosition(ppos);
                    const arr = line.geometry.attributes.position.array;
                    arr[0] = ppos.x; arr[1] = ppos.y; arr[2] = ppos.z;
                    arr[3] = pos.x; arr[4] = pos.y; arr[5] = pos.z;
                    line.geometry.attributes.position.needsUpdate = true;
                }
            });
        }

        function deselectBone() {
            if (!selectedBone) return;
            const h = boneHelpers.find(b => b.bone === selectedBone);
            if (h) { h.sphere.material.color.setHex(0xffffff); h.sphere.scale.setScalar(1); }
            selectedBone = null;
            inspBone.classList.remove('visible');
        }

        function selectBone(bone) {
            deselectBone();
            deselectZone();
            selectedBone = bone;
            const h = boneHelpers.find(b => b.bone === bone);
            if (h) { h.sphere.material.color.setHex(0xff2a74); h.sphere.scale.setScalar(1.6); }

            const user = boneUserRotations.get(bone.uuid) || {x:0,y:0,z:0};
            document.getElementById('bone-name').textContent = bone.name || 'Joint';
            document.getElementById('bone-rot-x').value = user.x;
            document.getElementById('bone-rot-y').value = user.y;
            document.getElementById('bone-rot-z').value = user.z;
            updateBoneSliderLabels(user.x, user.y, user.z);

            inspZone.classList.remove('visible');
            inspBone.classList.add('visible');
            inspector.classList.add('active');
        }

        function updateBoneSliderLabels(x,y,z) {
            document.getElementById('bone-val-x').textContent = x + '°';
            document.getElementById('bone-val-y').textContent = y + '°';
            document.getElementById('bone-val-z').textContent = z + '°';
        }

        function applyBoneRotation() {
            if (!selectedBone) return;
            const rx = parseFloat(document.getElementById('bone-rot-x').value);
            const ry = parseFloat(document.getElementById('bone-rot-y').value);
            const rz = parseFloat(document.getElementById('bone-rot-z').value);
            boneUserRotations.set(selectedBone.uuid, {x:rx, y:ry, z:rz});
            updateBoneSliderLabels(rx, ry, rz);
            const orig = originalBoneRotations.get(selectedBone.uuid);
            selectedBone.rotation.set(
                orig.x + rx * Math.PI/180,
                orig.y + ry * Math.PI/180,
                orig.z + rz * Math.PI/180
            );
            selectedBone.updateMatrixWorld(true);
        }

        ['bone-rot-x','bone-rot-y','bone-rot-z'].forEach(id => {
            document.getElementById(id).addEventListener('input', applyBoneRotation);
        });

        document.getElementById('bone-reset-btn').addEventListener('click', () => {
            if (!selectedBone) return;
            boneUserRotations.set(selectedBone.uuid, {x:0,y:0,z:0});
            ['bone-rot-x','bone-rot-y','bone-rot-z'].forEach(id => document.getElementById(id).value = 0);
            updateBoneSliderLabels(0,0,0);
            const orig = originalBoneRotations.get(selectedBone.uuid);
            selectedBone.rotation.copy(orig);
            selectedBone.updateMatrixWorld(true);
        });

        document.getElementById('pose-reset-all').addEventListener('click', () => {
            allBones.forEach(b => {
                boneUserRotations.set(b.uuid, {x:0,y:0,z:0});
                const orig = originalBoneRotations.get(b.uuid);
                if (orig) b.rotation.copy(orig);
            });
            if (selectedBone) {
                ['bone-rot-x','bone-rot-y','bone-rot-z'].forEach(id => document.getElementById(id).value = 0);
                updateBoneSliderLabels(0,0,0);
            }
            if (loadedModel) loadedModel.updateMatrixWorld(true);
        });

        // --- Jiggle Helpers ---
        function buildJiggleHelpers() {
            jellyParts.forEach((part, idx) => {
                if (part.zoneType === 'none') return;
                const color = ZONE_COLORS[part.zoneType] || 0xffffff;
                const r = Math.max(part.deformRadius * 0.5, 0.06);
                const geo = new THREE.SphereGeometry(r, 16, 16);
                const mat = new THREE.MeshBasicMaterial({
                    color: color, transparent: true, opacity: 0.35,
                    depthTest: false, side: THREE.DoubleSide
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.renderOrder = 990;
                mesh.userData = { isJiggleHelper: true, partIndex: idx };
                scene.add(mesh);
                jiggleHelpers.push({ part, mesh, color });
            });
        }

        function updateJiggleHelpers() {
            jiggleHelpers.forEach(({ part, mesh, color }) => {
                const center = part.localCenter.clone();
                part.mesh.localToWorld(center);
                mesh.position.copy(center);
                mesh.material.opacity = part.active ? 0.35 : 0.08;
                mesh.material.color.setHex(part.active ? color : 0x555555);
            });
        }

        function deselectZone() {
            if (!selectedZone) return;
            selectedZone = null;
            inspZone.classList.remove('visible');
        }

        function selectZone(part) {
            deselectBone();
            deselectZone();
            selectedZone = part;
            document.getElementById('zone-name').textContent = part.mesh.name || 'Zone';
            const tag = document.getElementById('zone-tag');
            tag.textContent = part.zoneType;
            tag.className = 'pill-tag ' + part.zoneType;
            document.getElementById('zone-active-toggle').checked = part.active;

            // Set sliders to current overrides or defaults
            const defs = getZoneDefaults(part.zoneType);
            document.getElementById('zone-stiff').value = part.customStiffness ?? defs.stiffness;
            document.getElementById('zone-damp').value = part.customDamping ?? defs.damping;
            document.getElementById('zone-grav').value = part.customGravity ?? defs.gravity;
            updateZoneSliderLabels();

            inspBone.classList.remove('visible');
            inspZone.classList.add('visible');
            inspector.classList.add('active');
        }

        function getZoneDefaults(type) {
            if (type === 'breast') return { stiffness: 0.025, damping: 0.88, gravity: -0.002 };
            if (type === 'muscle') return { stiffness: 0.06, damping: 0.80, gravity: 0 };
            return { stiffness: 0.03, damping: 0.86, gravity: -0.001 };
        }

        function updateZoneSliderLabels() {
            document.getElementById('zone-stiff-val').textContent = parseFloat(document.getElementById('zone-stiff').value).toFixed(3);
            document.getElementById('zone-damp-val').textContent = parseFloat(document.getElementById('zone-damp').value).toFixed(2);
            document.getElementById('zone-grav-val').textContent = parseFloat(document.getElementById('zone-grav').value).toFixed(4);
        }

        function applyZoneSettings() {
            if (!selectedZone) return;
            selectedZone.active = document.getElementById('zone-active-toggle').checked;
            selectedZone.customStiffness = parseFloat(document.getElementById('zone-stiff').value);
            selectedZone.customDamping = parseFloat(document.getElementById('zone-damp').value);
            selectedZone.customGravity = parseFloat(document.getElementById('zone-grav').value);
            updateZoneSliderLabels();
        }

        ['zone-stiff','zone-damp','zone-grav'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => { applyZoneSettings(); });
        });
        document.getElementById('zone-active-toggle').addEventListener('change', applyZoneSettings);

        document.getElementById('zones-reset-btn').addEventListener('click', () => {
            jellyParts.forEach(p => {
                if (p.zoneType !== 'none') {
                    p.active = true;
                    p.customStiffness = null;
                    p.customDamping = null;
                    p.customGravity = null;
                }
            });
            if (selectedZone) {
                const defs = getZoneDefaults(selectedZone.zoneType);
                document.getElementById('zone-active-toggle').checked = true;
                document.getElementById('zone-stiff').value = defs.stiffness;
                document.getElementById('zone-damp').value = defs.damping;
                document.getElementById('zone-grav').value = defs.gravity;
                updateZoneSliderLabels();
            }
        });

        // --- Pointer / Raycasting ---
        function updatePointer(e) {
            let cx = e.clientX, cy = e.clientY;
            if (e.touches && e.touches.length > 0) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
            pointer.x = (cx / window.innerWidth) * 2 - 1;
            pointer.y = -(cy / window.innerHeight) * 2 + 1;
        }

        function onPointerDown(e) {
            if (e.target.closest('#mode-dock') || e.target.closest('#inspector')) return;
            isPointerDown = true;
            updatePointer(e);

            if (currentMode === 'pose') {
                raycaster.setFromCamera(pointer, camera);
                const hits = raycaster.intersectObjects(boneHelpers.map(b => b.sphere));
                if (hits.length > 0) {
                    const bone = hits[0].object.userData.bone;
                    selectBone(bone);
                    e.preventDefault();
                    return;
                }
            }
            if (currentMode === 'zones') {
                raycaster.setFromCamera(pointer, camera);
                const hits = raycaster.intersectObjects(jiggleHelpers.map(j => j.mesh));
                if (hits.length > 0) {
                    const part = jellyParts[hits[0].object.userData.partIndex];
                    selectZone(part);
                    e.preventDefault();
                    return;
                }
            }
            if (currentMode === 'squish') {
                deformJelly();
            }
        }

        function onPointerMove(e) {
            updatePointer(e);
            if (currentMode === 'squish' && isPointerDown) deformJelly();
            if (currentMode === 'pose') {
                raycaster.setFromCamera(pointer, camera);
                const hits = raycaster.intersectObjects(boneHelpers.map(b => b.sphere));
                document.body.style.cursor = hits.length > 0 ? 'pointer' : 'default';
            } else if (currentMode === 'zones') {
                raycaster.setFromCamera(pointer, camera);
                const hits = raycaster.intersectObjects(jiggleHelpers.map(j => j.mesh));
                document.body.style.cursor = hits.length > 0 ? 'pointer' : 'default';
                // Hover scale effect
                jiggleHelpers.forEach(j => j.mesh.scale.setScalar(1));
                if (hits.length > 0) {
                    hits[0].object.scale.setScalar(1.25);
                }
            } else {
                document.body.style.cursor = 'default';
            }
        }

        window.addEventListener('pointerdown', onPointerDown);
        window.addEventListener('pointermove', onPointerMove);
        window.addEventListener('pointerup', () => isPointerDown = false);
        window.addEventListener('touchmove', e => { if (currentMode === 'squish') e.preventDefault(); }, { passive: false });

        // --- Deformation ---
        function deformJelly() {
            if (jellyParts.length === 0) return;
            raycaster.setFromCamera(pointer, camera);
            const meshes = jellyParts.map(p => p.mesh);
            const hits = raycaster.intersectObjects(meshes);
            if (hits.length > 0) {
                const hit = hits[0];
                const targetMesh = hit.object;
                const localHit = targetMesh.worldToLocal(hit.point.clone());
                const strength = 0.5;
                jellyParts.forEach(part => {
                    if (part.mesh !== targetMesh) return;
                    const { currentPositions, velocities, deformRadius } = part;
                    const rSq = deformRadius * deformRadius;
                    for (let i = 0; i < currentPositions.length / 3; i++) {
                        const idx = i * 3;
                        const dx = currentPositions[idx] - localHit.x;
                        const dy = currentPositions[idx+1] - localHit.y;
                        const dz = currentPositions[idx+2] - localHit.z;
                        const distSq = dx*dx + dy*dy + dz*dz;
                        if (distSq < rSq) {
                            const dist = Math.sqrt(distSq);
                            const falloff = (1 - dist / deformRadius) * strength;
                            velocities[idx] += dx * falloff;
                            velocities[idx+1] += dy * falloff;
                            velocities[idx+2] += dz * falloff;
                        }
                    }
                });
            }
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();

            // Update helpers positions
            if (loadedModel) {
                updateBoneHelpers();
                updateJiggleHelpers();
            }

            // Physics
            jellyParts.forEach(part => {
                const { mesh, originalPositions, currentPositions, velocities, zoneType, active } = part;
                const posAttr = mesh.geometry.attributes.position;

                if (!active) {
                    let dirty = false;
                    for (let i = 0; i < posAttr.count; i++) {
                        const idx = i*3;
                        const dx = originalPositions[idx] - currentPositions[idx];
                        const dy = originalPositions[idx+1] - currentPositions[idx+1];
                        const dz = originalPositions[idx+2] - currentPositions[idx+2];
                        if (Math.abs(dx)>0.001 || Math.abs(dy)>0.001 || Math.abs(dz)>0.001) {
                            velocities[idx] = dx * 0.08;
                            velocities[idx+1] = dy * 0.08;
                            velocities[idx+2] = dz * 0.08;
                            currentPositions[idx] += velocities[idx];
                            currentPositions[idx+1] += velocities[idx+1];
                            currentPositions[idx+2] += velocities[idx+2];
                            dirty = true;
                        } else {
                            velocities[idx]=velocities[idx+1]=velocities[idx+2]=0;
                            currentPositions[idx]=originalPositions[idx];
                            currentPositions[idx+1]=originalPositions[idx+1];
                            currentPositions[idx+2]=originalPositions[idx+2];
                        }
                    }
                    if (dirty) { posAttr.needsUpdate = true; mesh.geometry.computeVertexNormals(); }
                    return;
                }

                let stiffness = 0.04, damping = 0.84, nonlinearMult = 3.0, gravity = 0.0;
                if (part.customStiffness !== null) stiffness = part.customStiffness;
                else if (zoneType === 'breast') stiffness = 0.025;
                else if (zoneType === 'muscle') stiffness = 0.06;
                else if (zoneType === 'soft') stiffness = 0.03;

                if (part.customDamping !== null) damping = part.customDamping;
                else if (zoneType === 'breast') damping = 0.88;
                else if (zoneType === 'muscle') damping = 0.80;
                else if (zoneType === 'soft') damping = 0.86;

                if (part.customGravity !== null) gravity = part.customGravity;
                else if (zoneType === 'breast') gravity = -0.002;
                else if (zoneType === 'soft') gravity = -0.001;

                for (let i = 0; i < posAttr.count; i++) {
                    const idx = i*3;
                    const dx = originalPositions[idx] - currentPositions[idx];
                    const dy = originalPositions[idx+1] - currentPositions[idx+1];
                    const dz = originalPositions[idx+2] - currentPositions[idx+2];
                    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
                    const nonlinear = 1.0 + dist * nonlinearMult;

                    let fx = dx * stiffness * nonlinear;
                    let fy = dy * stiffness * nonlinear + gravity;
                    let fz = dz * stiffness * nonlinear;

                    velocities[idx] = (velocities[idx] + fx) * damping;
                    velocities[idx+1] = (velocities[idx+1] + fy) * damping;
                    velocities[idx+2] = (velocities[idx+2] + fz) * damping;

                    currentPositions[idx] += velocities[idx];
                    currentPositions[idx+1] += velocities[idx+1];
                    currentPositions[idx+2] += velocities[idx+2];
                }
                posAttr.needsUpdate = true;
                mesh.geometry.computeVertexNormals();
            });

            if (currentMode === 'view' || currentMode === 'zones') controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
