<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Assistant - Physics & Interaction</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 10;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background: #007bff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background 0.2s;
        }
        button:active { background: #0056b3; }
        button.active-mode { background: #ff4757; }
    </style>
</head>
<body>

    <div id="ui-container">
        <button id="interact-btn">Enable Joint Editing</button>
        <button id="control-mode-btn" style="display:none;">Mode: Rotate</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Optimized for high-res screens
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
        hemiLight.position.set(0, 2, 0);
        scene.add(hemiLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(2, 2, 3);
        scene.add(dirLight);

        // --- Controls ---
        const orbit = new OrbitControls(camera, renderer.domElement);
        orbit.target.set(0, 1, 0);
        orbit.update();

        const transformControl = new TransformControls(camera, renderer.domElement);
        transformControl.addEventListener('dragging-changed', (event) => {
            orbit.enabled = !event.value; // Disable orbit when moving a joint
        });
        scene.add(transformControl);

        // --- Variables for Physics & Interaction ---
        let model, skeleton;
        const boneHelpers = [];
        const physicsBones = []; 
        let isInteractMode = false;

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // --- Load GLB ---
        const loader = new GLTFLoader();
        loader.load('assis.glb', (gltf) => {
            model = gltf.scene;
            scene.add(model);

            // Find SkinnedMesh and Skeleton
            model.traverse((child) => {
                if (child.isSkinnedMesh) {
                    skeleton = child.skeleton;
                    setupBoneHelpers(skeleton);
                }
                // Auto-detect bones with "hair" or "breast" in their name for physics
                if (child.isBone) {
                    const name = child.name.toLowerCase();
                    if (name.includes('hair') || name.includes('breast') || name.includes('jiggle')) {
                        physicsBones.push({
                            bone: child,
                            baseRotation: child.rotation.clone(),
                            velocity: new THREE.Vector3(),
                            stiffness: 0.15,
                            damping: 0.85
                        });
                    }
                }
            });
        }, undefined, (error) => console.error('Error loading model:', error));

        // --- Bone Helpers for Clicking ---
        // Bones are invisible. We attach small spheres to them so the raycaster has something to hit.
        function setupBoneHelpers(skeleton) {
            const sphereGeo = new THREE.SphereGeometry(0.05, 8, 8);
            const sphereMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true, transparent: true, opacity: 0.5 });

            skeleton.bones.forEach(bone => {
                const helper = new THREE.Mesh(sphereGeo, sphereMat);
                helper.visible = false; // Hidden by default
                helper.userData.isBoneHelper = true;
                helper.userData.targetBone = bone;
                bone.add(helper);
                boneHelpers.push(helper);
            });
        }

        // --- UI Interaction ---
        const interactBtn = document.getElementById('interact-btn');
        const modeBtn = document.getElementById('control-mode-btn');

        interactBtn.addEventListener('click', () => {
            isInteractMode = !isInteractMode;
            interactBtn.classList.toggle('active-mode');
            interactBtn.innerText = isInteractMode ? "Disable Joint Editing" : "Enable Joint Editing";
            modeBtn.style.display = isInteractMode ? "block" : "none";
            
            // Toggle visibility of bone clickable spheres
            boneHelpers.forEach(h => h.visible = isInteractMode);
            
            if (!isInteractMode) transformControl.detach();
        });

        modeBtn.addEventListener('click', () => {
            const currentMode = transformControl.getMode();
            if (currentMode === 'translate') {
                transformControl.setMode('rotate');
                modeBtn.innerText = "Mode: Rotate";
            } else {
                transformControl.setMode('translate');
                modeBtn.innerText = "Mode: Translate";
            }
        });

        // --- Raycasting (Selecting Joints) ---
        window.addEventListener('pointerdown', (event) => {
            if (!isInteractMode) return;

            // Calculate mouse position in normalized device coordinates (-1 to +1)
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(boneHelpers);

            if (intersects.length > 0) {
                const selectedBone = intersects[0].object.userData.targetBone;
                transformControl.attach(selectedBone);
            } else if (!transformControl.dragging) {
                // Clicked empty space, detach
                transformControl.detach();
            }
        });

        // --- Responsive Window ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Physics & Render Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Fake Jiggle / Hair Physics Math
            // This applies a sine-wave based wobble mixed with a spring constraint.
            // If the model moves, you can inject world velocity here.
            physicsBones.forEach(pb => {
                // Procedural idle jiggle (simulating wind/breathing)
                const wobbleX = Math.sin(time * 3 + pb.bone.position.y) * 0.02;
                const wobbleZ = Math.cos(time * 4 + pb.bone.position.x) * 0.02;

                // Simple spring return to base rotation
                pb.bone.rotation.x += (pb.baseRotation.x + wobbleX - pb.bone.rotation.x) * pb.stiffness;
                pb.bone.rotation.z += (pb.baseRotation.z + wobbleZ - pb.bone.rotation.z) * pb.stiffness;
            });

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
