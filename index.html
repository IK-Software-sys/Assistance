<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jelly 3D Viewer & Interactor</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #ui-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 90%;
            max-width: 400px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: white;
            padding: 15px 32px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            width: 100%;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn.active {
            background: #ff2a74;
            border-color: #ff6699;
            box-shadow: 0 0 20px rgba(255, 42, 116, 0.6);
        }

        #status-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            text-align: center;
        }

        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #1a1a2e;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            transition: opacity 0.5s ease;
        }

        /* --- JOINT PANEL --- */
        #joint-panel {
            position: absolute;
            right: 15px;
            top: 15px;
            width: 300px;
            max-height: 85vh;
            background: rgba(15, 15, 35, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 16px;
            color: #eee;
            z-index: 20;
            display: none;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        #joint-panel.active {
            display: flex;
        }

        #joint-panel h3 {
            margin: 0 0 10px 0;
            font-size: 15px;
            color: #ff85a7;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }

        #bone-tree {
            overflow-y: auto;
            flex: 1;
            font-size: 13px;
            margin-bottom: 10px;
            padding-right: 4px;
        }

        #bone-tree::-webkit-scrollbar { width: 6px; }
        #bone-tree::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

        .bone-node {
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 6px;
            margin: 2px 0;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.15s;
            white-space: nowrap;
        }

        .bone-node:hover { background: rgba(255,255,255,0.08); }
        .bone-node.selected { background: rgba(255, 42, 116, 0.35); border: 1px solid rgba(255, 42, 116, 0.5); }
        .bone-node .toggle { width: 14px; text-align: center; color: #888; font-size: 11px; }
        .bone-node .icon { font-size: 11px; }
        .bone-node .name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
        .bone-node .tag {
            font-size: 9px;
            padding: 1px 5px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
            color: #aaa;
        }
        .bone-node .tag.jiggle { background: rgba(255, 42, 116, 0.3); color: #ff85a7; }

        .bone-children {
            padding-left: 18px;
            border-left: 1px solid rgba(255,255,255,0.06);
            margin-left: 6px;
            display: none;
        }
        .bone-children.expanded { display: block; }

        #bone-controls {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 12px;
            margin-top: 4px;
        }

        #selected-bone-name {
            font-weight: bold;
            font-size: 13px;
            color: #fff;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .slider-group {
            margin-bottom: 10px;
        }

        .slider-group label {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #aaa;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .slider-group input[type=range] {
            width: 100%;
            -webkit-appearance: none;
            height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.15);
            outline: none;
        }
        .slider-group input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ff2a74;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(255,42,116,0.5);
        }

        .panel-section {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 12px;
            margin-top: 12px;
        }

        .panel-section h4 {
            margin: 0 0 8px 0;
            font-size: 13px;
            color: #ff85a7;
        }

        .zone-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 4px;
            font-size: 12px;
            border-radius: 6px;
            margin-bottom: 4px;
        }
        .zone-row:hover { background: rgba(255,255,255,0.05); }

        .zone-toggle {
            appearance: none;
            width: 36px;
            height: 20px;
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            outline: none;
            transition: background 0.2s;
        }
        .zone-toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s;
        }
        .zone-toggle:checked { background: #ff2a74; }
        .zone-toggle:checked::after { transform: translateX(16px); }

        .small-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .small-btn:hover { background: rgba(255,255,255,0.2); }
        .small-btn.active { background: #ff2a74; border-color: #ff6699; }

        .row-btns {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        #jiggle-config {
            display: none;
        }
        #jiggle-config.visible {
            display: block;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="loading">
        <div id="loading-text">Loading Jelly Model...</div>
    </div>

    <div id="canvas-container"></div>

    <div id="ui-container">
        <div id="status-text">Mode: View & Rotate</div>
        <button id="interact-btn" class="btn">Interact Mode: OFF</button>
        <button id="joint-btn" class="btn">Joint Config</button>
    </div>

    <!-- JOINT & JIGGLE PANEL -->
    <div id="joint-panel">
        <h3>Skeleton Joints</h3>
        <div id="bone-tree"></div>

        <div id="bone-controls" style="display:none;">
            <div id="selected-bone-name">
                <span id="sel-bone-label">None</span>
                <button class="small-btn" id="reset-bone-btn">Reset</button>
            </div>
            <div class="slider-group">
                <label>Rotate X <span id="val-x">0°</span></label>
                <input type="range" id="rot-x" min="-180" max="180" value="0" step="1">
            </div>
            <div class="slider-group">
                <label>Rotate Y <span id="val-y">0°</span></label>
                <input type="range" id="rot-y" min="-180" max="180" value="0" step="1">
            </div>
            <div class="slider-group">
                <label>Rotate Z <span id="val-z">0°</span></label>
                <input type="range" id="rot-z" min="-180" max="180" value="0" step="1">
            </div>
        </div>

        <div class="panel-section">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h4 style="margin:0">Jiggle Zones</h4>
                <button class="small-btn" id="toggle-jiggle-config">Configure</button>
            </div>
            <div id="jiggle-list"></div>
        </div>

        <div id="jiggle-config" class="panel-section">
            <h4>Physics Parameters</h4>
            <div id="jiggle-params"></div>
            <div class="row-btns">
                <button class="small-btn" id="auto-jiggle-btn">Auto-Detect</button>
                <button class="small-btn" id="reset-pose-btn">Reset Pose</button>
            </div>
        </div>
    </div>

    <script>
        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.4;
        container.appendChild(renderer.domElement);

        const gridHelper = new THREE.GridHelper(10, 10, 0xff2a74, 0x444466);
        gridHelper.position.y = -1;
        scene.add(gridHelper);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        const dirLight2 = new THREE.DirectionalLight(0x00aaff, 0.5);
        dirLight2.position.set(-5, 5, -5);
        scene.add(dirLight2);

        // Rim light for sexier shading on skin
        const rimLight = new THREE.SpotLight(0xff2a74, 2.0);
        rimLight.position.set(0, 5, -5);
        rimLight.lookAt(0,0,0);
        scene.add(rimLight);

        // --- Controls ---
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0, 0);

        // --- State ---
        let jellyParts = []; 
        let isInteractMode = false;
        let isPointerDown = false;
        let isJointMode = false;

        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();

        // --- Skeleton State ---
        let allBones = [];
        let boneMap = new Map(); // uuid -> bone
        let selectedBone = null;
        let originalBoneRotations = new Map(); // uuid -> Euler
        let boneUserRotations = new Map(); // uuid -> {x,y,z} degrees

        // --- Jiggle Zones ---
        let jiggleZones = []; // { mesh, originalPositions, velocities, params, active }
        let globalJiggleEnabled = true;

        // Name patterns for auto-detection
        const JIGGLE_PATTERNS = {
            breast: /breast|boob|bust|chest|pec|torso_front|mune/i,
            muscle: /muscle|bicep|tricep|delt|quad|glute|butt|thigh|calf|arm|leg/i,
            soft: /belly|stomach|tummy|waist|hip/i
        };

        // --- Loader ---
        const loader = new THREE.GLTFLoader();
        let loadedModel = null;

        loader.load('./Jel.glb', function (gltf) {
            const model = gltf.scene;
            loadedModel = model;

            // 1. Collect meshes and prepare physics
            model.traverse((child) => {
                if (child.isMesh) {
                    const mesh = child;
                    mesh.geometry = mesh.geometry.clone();

                    const posAttr = mesh.geometry.attributes.position;
                    const originalPositions = posAttr.array.slice(); 
                    const currentPositions = posAttr.array;          
                    const velocities = new Float32Array(posAttr.count * 3); 

                    if(mesh.material) {
                        mesh.material.roughness = 0.25;
                        mesh.material.metalness = 0.05;
                        mesh.material.side = THREE.DoubleSide;
                        // Slightly more subsurface-like for skin
                        if(mesh.material.color) {
                            mesh.material.emissive = new THREE.Color(0x220511);
                            mesh.material.emissiveIntensity = 0.2;
                        }
                    }

                    const box = new THREE.Box3().setFromObject(mesh);
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const deformRadius = Math.max(maxDim * 0.35, 0.15);

                    // Check if this mesh matches any jiggle pattern
                    const meshName = mesh.name.toLowerCase();
                    let zoneType = 'none';
                    for (const [type, regex] of Object.entries(JIGGLE_PATTERNS)) {
                        if (regex.test(meshName)) { zoneType = type; break; }
                    }

                    jellyParts.push({
                        mesh: mesh,
                        originalPositions: originalPositions,
                        currentPositions: currentPositions,
                        velocities: velocities,
                        deformRadius: deformRadius,
                        zoneType: zoneType,
                        active: zoneType !== 'none'
                    });
                }
            });

            // 2. Extract Skeleton / Bones
            let skeletonRoot = null;
            model.traverse((child) => {
                if (child.isBone || (child.type === 'Bone')) {
                    if (!skeletonRoot) skeletonRoot = findRootBone(child);
                }
                // Also check skinned meshes for skeleton reference
                if (child.isSkinnedMesh && child.skeleton) {
                    child.skeleton.bones.forEach(b => {
                        if (!boneMap.has(b.uuid)) {
                            boneMap.set(b.uuid, b);
                            allBones.push(b);
                        }
                    });
                }
            });

            // If we found bones via skinned meshes, build tree from actual roots
            const rootBones = [];
            allBones.forEach(b => {
                if (!b.parent || !boneMap.has(b.parent.uuid)) {
                    rootBones.push(b);
                }
            });

            // Store original rotations
            allBones.forEach(b => {
                originalBoneRotations.set(b.uuid, b.rotation.clone());
                boneUserRotations.set(b.uuid, { x: 0, y: 0, z: 0 });
            });

            // Build bone tree UI
            buildBoneTree(rootBones);
            updateJiggleList();

            // 3. Center and scale
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());

            const maxDim = Math.max(size.x, size.y, size.z);
            const scaleFactor = 2 / maxDim;
            model.scale.set(scaleFactor, scaleFactor, scaleFactor);

            const updatedBox = new THREE.Box3().setFromObject(model);
            const updatedCenter = updatedBox.getCenter(new THREE.Vector3());
            model.position.sub(updatedCenter); 

            scene.add(model);

            camera.position.set(0, 1.5, 4);
            controls.target.set(0, 0, 0);
            controls.update();

            document.getElementById('loading').style.opacity = 0;
            setTimeout(() => document.getElementById('loading').style.display = 'none', 500);

        }, function (xhr) {
            if(xhr.total > 0) {
                const percent = Math.round((xhr.loaded / xhr.total) * 100);
                document.getElementById('loading-text').innerText = `Loading: ${percent}%`;
            }
        }, function (error) {
            console.error(error);
            document.getElementById('loading-text').innerHTML = 
                `<span style="color: #ff2a74;">Error loading 'Jel.glb'</span><br>
                 <small style="font-size:14px; color:aaa;">Check if file name matches capitalization exactly.</small>`;
        });

        function findRootBone(bone) {
            let current = bone;
            while(current.parent && (current.parent.isBone || current.parent.type === 'Bone')) {
                current = current.parent;
            }
            return current;
        }

        // --- UI: Bone Tree ---
        const boneTreeEl = document.getElementById('bone-tree');

        function buildBoneTree(roots) {
            boneTreeEl.innerHTML = '';
            if (allBones.length === 0) {
                boneTreeEl.innerHTML = '<div style="color:#888; font-size:12px; padding:8px;">No skeleton found in this model.</div>';
                return;
            }
            roots.forEach(root => renderBoneNode(root, boneTreeEl, 0));
        }

        function renderBoneNode(bone, parentEl, depth) {
            const hasChildren = bone.children && bone.children.filter(c => c.isBone || c.type === 'Bone').length > 0;
            const childBones = hasChildren ? bone.children.filter(c => c.isBone || c.type === 'Bone') : [];

            const node = document.createElement('div');
            node.className = 'bone-node';
            node.dataset.uuid = bone.uuid;
            node.style.paddingLeft = (8 + depth * 12) + 'px';

            const toggle = hasChildren ? '<span class="toggle">▶</span>' : '<span class="toggle" style="visibility:hidden">▶</span>';
            const icon = '<span class="icon">🦴</span>';
            const name = `<span class="name" title="${bone.name}">${bone.name}</span>`;

            // Check if any jiggle mesh is weighted to this bone
            const hasJiggle = false; // Simplified
            const tag = hasJiggle ? '<span class="tag jiggle">jiggle</span>' : '';

            node.innerHTML = `${toggle}${icon}${name}${tag}`;

            if (hasChildren) {
                const childrenContainer = document.createElement('div');
                childrenContainer.className = 'bone-children';
                childBones.forEach(child => renderBoneNode(child, childrenContainer, depth + 1));

                node.querySelector('.toggle').addEventListener('click', (e) => {
                    e.stopPropagation();
                    childrenContainer.classList.toggle('expanded');
                    node.querySelector('.toggle').textContent = childrenContainer.classList.contains('expanded') ? '▼' : '▶';
                });

                parentEl.appendChild(node);
                parentEl.appendChild(childrenContainer);
            } else {
                parentEl.appendChild(node);
            }

            node.addEventListener('click', () => selectBone(bone));
        }

        function selectBone(bone) {
            // Deselect previous
            document.querySelectorAll('.bone-node.selected').forEach(el => el.classList.remove('selected'));

            // Select new
            const el = document.querySelector(`.bone-node[data-uuid="${bone.uuid}"]`);
            if (el) el.classList.add('selected');

            selectedBone = bone;
            const userRot = boneUserRotations.get(bone.uuid) || {x:0, y:0, z:0};

            document.getElementById('bone-controls').style.display = 'block';
            document.getElementById('sel-bone-label').textContent = bone.name;

            document.getElementById('rot-x').value = userRot.x;
            document.getElementById('rot-y').value = userRot.y;
            document.getElementById('rot-z').value = userRot.z;

            updateSliderLabels(userRot.x, userRot.y, userRot.z);
        }

        function updateSliderLabels(x, y, z) {
            document.getElementById('val-x').textContent = x + '°';
            document.getElementById('val-y').textContent = y + '°';
            document.getElementById('val-z').textContent = z + '°';
        }

        function applyBoneRotation() {
            if (!selectedBone) return;
            const rx = parseFloat(document.getElementById('rot-x').value);
            const ry = parseFloat(document.getElementById('rot-y').value);
            const rz = parseFloat(document.getElementById('rot-z').value);

            boneUserRotations.set(selectedBone.uuid, { x: rx, y: ry, z: rz });
            updateSliderLabels(rx, ry, rz);

            const orig = originalBoneRotations.get(selectedBone.uuid);
            selectedBone.rotation.set(
                orig.x + rx * Math.PI / 180,
                orig.y + ry * Math.PI / 180,
                orig.z + rz * Math.PI / 180
            );
        }

        ['rot-x', 'rot-y', 'rot-z'].forEach(id => {
            document.getElementById(id).addEventListener('input', applyBoneRotation);
        });

        document.getElementById('reset-bone-btn').addEventListener('click', () => {
            if (!selectedBone) return;
            boneUserRotations.set(selectedBone.uuid, { x: 0, y: 0, z: 0 });
            document.getElementById('rot-x').value = 0;
            document.getElementById('rot-y').value = 0;
            document.getElementById('rot-z').value = 0;
            updateSliderLabels(0, 0, 0);
            const orig = originalBoneRotations.get(selectedBone.uuid);
            selectedBone.rotation.copy(orig);
        });

        document.getElementById('reset-pose-btn').addEventListener('click', () => {
            allBones.forEach(bone => {
                boneUserRotations.set(bone.uuid, { x: 0, y: 0, z: 0 });
                const orig = originalBoneRotations.get(bone.uuid);
                if (orig) bone.rotation.copy(orig);
            });
            if (selectedBone) {
                document.getElementById('rot-x').value = 0;
                document.getElementById('rot-y').value = 0;
                document.getElementById('rot-z').value = 0;
                updateSliderLabels(0, 0, 0);
            }
        });

        // --- Jiggle Zone UI ---
        function updateJiggleList() {
            const list = document.getElementById('jiggle-list');
            list.innerHTML = '';

            const types = {};
            jellyParts.forEach(p => {
                if (p.zoneType === 'none') return;
                if (!types[p.zoneType]) types[p.zoneType] = [];
                types[p.zoneType].push(p);
            });

            if (Object.keys(types).length === 0) {
                list.innerHTML = '<div style="color:#888; font-size:11px;">No zones detected. Use Auto-Detect.</div>';
                return;
            }

            for (const [type, parts] of Object.entries(types)) {
                const row = document.createElement('div');
                row.className = 'zone-row';
                const label = type.charAt(0).toUpperCase() + type.slice(1);
                const allActive = parts.every(p => p.active);
                row.innerHTML = `
                    <span>${label} (${parts.length})</span>
                    <input type="checkbox" class="zone-toggle" ${allActive ? 'checked' : ''} data-type="${type}">
                `;
                row.querySelector('input').addEventListener('change', (e) => {
                    const active = e.target.checked;
                    parts.forEach(p => p.active = active);
                });
                list.appendChild(row);
            }
        }

        document.getElementById('toggle-jiggle-config').addEventListener('click', () => {
            document.getElementById('jiggle-config').classList.toggle('visible');
        });

        document.getElementById('auto-jiggle-btn').addEventListener('click', () => {
            // Re-scan with broader patterns
            const broadPatterns = /breast|boob|bust|chest|pec|mune|belly|stomach|tummy|waist|hip|butt|glute|thigh|arm|leg|muscle|bicep|tricep|delt|quad|calf/i;
            let found = 0;
            jellyParts.forEach(p => {
                if (broadPatterns.test(p.mesh.name.toLowerCase())) {
                    p.active = true;
                    if (p.zoneType === 'none') p.zoneType = 'soft';
                    found++;
                }
            });
            updateJiggleList();
            alert(`Auto-detected ${found} jiggle zones. Enable them in the list above.`);
        });

        // --- UI Interactions ---
        const interactBtn = document.getElementById('interact-btn');
        const jointBtn = document.getElementById('joint-btn');
        const statusText = document.getElementById('status-text');
        const jointPanel = document.getElementById('joint-panel');

        interactBtn.addEventListener('click', () => {
            isInteractMode = !isInteractMode;
            if (isInteractMode) {
                interactBtn.innerText = "Interact Mode: ON";
                interactBtn.classList.add('active');
                statusText.innerText = "Action: Drag/Touch the jelly directly to squish it!";
                controls.enabled = false; 
            } else {
                interactBtn.innerText = "Interact Mode: OFF";
                interactBtn.classList.remove('active');
                statusText.innerText = "Mode: View & Rotate";
                controls.enabled = true;  
            }
        });

        jointBtn.addEventListener('click', () => {
            isJointMode = !isJointMode;
            jointPanel.classList.toggle('active');
            jointBtn.classList.toggle('active');
            if (isJointMode) {
                statusText.innerText = "Mode: Joint Configuration";
            } else {
                statusText.innerText = isInteractMode ? "Action: Drag/Touch the jelly directly to squish it!" : "Mode: View & Rotate";
            }
        });

        // --- Touch Inputs ---
        function updatePointer(event) {
            let clientX = event.clientX;
            let clientY = event.clientY;
            if (event.touches && event.touches.length > 0) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            }
            pointer.x = (clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(clientY / window.innerHeight) * 2 + 1;
        }

        window.addEventListener('pointerdown', (e) => {
            // Don't trigger if clicking UI
            if (e.target.closest('#ui-container') || e.target.closest('#joint-panel')) return;
            isPointerDown = true;
            updatePointer(e);
            if(isInteractMode) deformJelly();
        });

        window.addEventListener('pointermove', (e) => {
            updatePointer(e);
            if (isInteractMode && isPointerDown) deformJelly();
        });

        window.addEventListener('pointerup', () => { isPointerDown = false; });
        window.addEventListener('touchmove', (e) => { if(isInteractMode) e.preventDefault(); }, { passive: false });

        // --- Jelly Physics Deformation ---
        function deformJelly() {
            if (jellyParts.length === 0) return;

            raycaster.setFromCamera(pointer, camera);
            const meshes = jellyParts.map(p => p.mesh);
            const intersects = raycaster.intersectObjects(meshes);

            if (intersects.length > 0) {
                const hit = intersects[0];
                const hitPoint = hit.point;
                const targetMesh = hit.object;
                const localHitPoint = targetMesh.worldToLocal(hitPoint.clone());

                const strength = 0.5;    

                jellyParts.forEach((part) => {
                    if (part.mesh !== targetMesh) return;

                    const { currentPositions, velocities, deformRadius } = part;
                    const radiusSq = deformRadius * deformRadius;

                    for (let i = 0; i < currentPositions.length / 3; i++) {
                        const idx = i * 3;

                        const dx = currentPositions[idx] - localHitPoint.x;
                        const dy = currentPositions[idx + 1] - localHitPoint.y;
                        const dz = currentPositions[idx + 2] - localHitPoint.z;
                        const distSq = dx*dx + dy*dy + dz*dz;

                        if (distSq < radiusSq) {
                            const distance = Math.sqrt(distSq);
                            const falloff = (1 - distance / deformRadius) * strength;
                            velocities[idx] += dx * falloff;
                            velocities[idx + 1] += dy * falloff;
                            velocities[idx + 2] += dz * falloff;
                        }
                    }
                });
            }
        }

        // --- Frame Loop ---
        function animate() {
            requestAnimationFrame(animate);

            // Physics for jiggle zones (breasts, muscles, etc.)
            jellyParts.forEach((part) => {
                if (!part.active) {
                    // Slowly return to rest if disabled
                    const { mesh, originalPositions, currentPositions, velocities } = part;
                    const posAttr = mesh.geometry.attributes.position;
                    let needsUpdate = false;
                    for (let i = 0; i < posAttr.count; i++) {
                        const idx = i * 3;
                        const dx = originalPositions[idx] - currentPositions[idx];
                        const dy = originalPositions[idx+1] - currentPositions[idx+1];
                        const dz = originalPositions[idx+2] - currentPositions[idx+2];
                        if (Math.abs(dx) > 0.001 || Math.abs(dy) > 0.001 || Math.abs(dz) > 0.001) {
                            velocities[idx] = dx * 0.1;
                            velocities[idx+1] = dy * 0.1;
                            velocities[idx+2] = dz * 0.1;
                            currentPositions[idx] += velocities[idx];
                            currentPositions[idx+1] += velocities[idx+1];
                            currentPositions[idx+2] += velocities[idx+2];
                            needsUpdate = true;
                        } else {
                            velocities[idx] = 0;
                            velocities[idx+1] = 0;
                            velocities[idx+2] = 0;
                            currentPositions[idx] = originalPositions[idx];
                            currentPositions[idx+1] = originalPositions[idx+1];
                            currentPositions[idx+2] = originalPositions[idx+2];
                        }
                    }
                    if (needsUpdate) {
                        posAttr.needsUpdate = true;
                        mesh.geometry.computeVertexNormals();
                    }
                    return;
                }

                const { mesh, originalPositions, currentPositions, velocities, zoneType } = part;
                const posAttr = mesh.geometry.attributes.position;

                // Zone-specific physics parameters
                let stiffness = 0.04;
                let damping = 0.84;
                let nonlinearMult = 3.0;
                let gravity = 0.0;

                if (zoneType === 'breast') {
                    stiffness = 0.025;   // Very soft
                    damping = 0.88;      // Long wobble
                    nonlinearMult = 2.0;
                    gravity = -0.002;    // Slight sag
                } else if (zoneType === 'muscle') {
                    stiffness = 0.06;    // Firmer
                    damping = 0.80;      // Quicker settle
                    nonlinearMult = 4.0;
                } else if (zoneType === 'soft') {
                    stiffness = 0.03;
                    damping = 0.86;
                    nonlinearMult = 2.5;
                    gravity = -0.001;
                }

                for (let i = 0; i < posAttr.count; i++) {
                    const idx = i * 3;

                    const dx = originalPositions[idx] - currentPositions[idx];
                    const dy = originalPositions[idx + 1] - currentPositions[idx + 1];
                    const dz = originalPositions[idx + 2] - currentPositions[idx + 2];

                    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
                    const nonlinear = 1.0 + dist * nonlinearMult;

                    let fx = dx * stiffness * nonlinear;
                    let fy = dy * stiffness * nonlinear + gravity;
                    let fz = dz * stiffness * nonlinear;

                    velocities[idx] = (velocities[idx] + fx) * damping;
                    velocities[idx + 1] = (velocities[idx + 1] + fy) * damping;
                    velocities[idx + 2] = (velocities[idx + 2] + fz) * damping;

                    currentPositions[idx] += velocities[idx];
                    currentPositions[idx + 1] += velocities[idx + 1];
                    currentPositions[idx + 2] += velocities[idx + 2];
                }

                posAttr.needsUpdate = true;
                mesh.geometry.computeVertexNormals();
            });

            if (!isInteractMode) controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
