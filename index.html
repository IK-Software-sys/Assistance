<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Assistant - Auto-Centered</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 10;
        }
        button {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            color: white;
            background: #222;
            border: 2px solid #555;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
        }
        button:active { transform: scale(0.95); }
        #interact-btn.active-mode { background: #ff4757; border-color: #ff6b81; }
        #control-mode-btn { background: #007bff; border-color: #00a8ff; }
    </style>
</head>
<body>

    <div id="ui-container">
        <button id="interact-btn">Enable Joint Editing</button>
        <button id="control-mode-btn" style="display:none;">Mode: Rotate</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        // --- Scene & Renderer ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
        camera.position.set(0, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        // --- Controls ---
        const orbit = new OrbitControls(camera, renderer.domElement);
        orbit.enableDamping = true;
        orbit.dampingFactor = 0.05;

        const transformControl = new TransformControls(camera, renderer.domElement);
        transformControl.setMode('rotate'); // Default editing mode
        transformControl.addEventListener('dragging-changed', (e) => orbit.enabled = !e.value);
        scene.add(transformControl);

        // --- State Variables ---
        let model, skeleton;
        const boneHelpers = [];
        const physicsBones = []; 
        let isInteractMode = false;

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // --- Load Model & Auto-Center Engine ---
        const loader = new GLTFLoader();
        loader.load('assis.glb', (gltf) => {
            model = gltf.scene;
            scene.add(model);

            // 1. Calculate Bounding Box of your specific model
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());

            // 2. Adjust Camera & Orbit Targets dynamically based on size
            const maxDim = Math.max(size.x, size.y, size.z);
            const fov = camera.fov * (Math.PI / 180);
            let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
            
            cameraZ *= 1.3; // Add padding so it's beautifully framed
            camera.position.set(center.x, center.y, center.z + cameraZ);
            camera.lookAt(center);
            
            orbit.target.copy(center);
            orbit.update();

            // 3. Dynamic Floor Grid based on model size
            const gridHelper = new THREE.GridHelper(maxDim * 4, 20, 0x444444, 0x222222);
            gridHelper.position.y = box.min.y; // Place grid right under her feet
            scene.add(gridHelper);

            // Update Directional Light target to the model
            dirLight.position.set(center.x + maxDim, center.y + maxDim, center.z + maxDim);
            dirLight.lookAt(center);

            // 4. Process Bones & Setup UI Helpers
            model.traverse((child) => {
                if (child.isSkinnedMesh) {
                    skeleton = child.skeleton;
                    // Pass maxDim to dynamically size selection handles
                    setupBoneHelpers(skeleton, maxDim);
                }
                if (child.isBone) {
                    const name = child.name.toLowerCase();
                    if (name.includes('hair') || name.includes('breast') || name.includes('jiggle') || name.includes('cloth')) {
                        physicsBones.push({
                            bone: child,
                            baseRotation: child.rotation.clone(),
                            stiffness: 0.1,
                            speed: 3 + Math.random() * 2
                        });
                    }
                }
            });

        }, undefined, (error) => {
            console.error("Loading crashed:", error);
            alert("Error loading 'assis.glb'. Make sure it's in the same folder and you're using a local development server.");
        });

        // --- Dynamic Bone Joint Handles ---
        function setupBoneHelpers(skeleton, modelSize) {
            // Dynamic scale: Joint spheres will always be 1.5% of total model size
            const sphereRadius = modelSize * 0.015; 
            const sphereGeo = new THREE.SphereGeometry(sphereRadius, 16, 16);
            const sphereMat = new THREE.MeshBasicMaterial({ 
                color: 0x00ffcc, 
                wireframe: true, 
                transparent: true, 
                opacity: 0.6 
            });

            skeleton.bones.forEach(bone => {
                const helper = new THREE.Mesh(sphereGeo, sphereMat);
                helper.visible = false; // Hidden until editing mode is turned on
                helper.userData.isBoneHelper = true;
                helper.userData.targetBone = bone;
                bone.add(helper);
                boneHelpers.push(helper);
            });
        }

        // --- UI Click Logic ---
        const interactBtn = document.getElementById('interact-btn');
        const modeBtn = document.getElementById('control-mode-btn');

        interactBtn.addEventListener('click', () => {
            isInteractMode = !isInteractMode;
            interactBtn.classList.toggle('active-mode');
            interactBtn.innerText = isInteractMode ? "Disable Joint Editing" : "Enable Joint Editing";
            modeBtn.style.display = isInteractMode ? "block" : "none";
            
            boneHelpers.forEach(h => h.visible = isInteractMode);
            if (!isInteractMode) transformControl.detach();
        });

        modeBtn.addEventListener('click', () => {
            const currentMode = transformControl.getMode();
            if (currentMode === 'rotate') {
                transformControl.setMode('translate');
                modeBtn.innerText = "Mode: Translate";
            } else {
                transformControl.setMode('rotate');
                modeBtn.innerText = "Mode: Rotate";
            }
        });

        // --- Raycasting Selection ---
        window.addEventListener('pointerdown', (event) => {
            if (!isInteractMode || transformControl.dragging) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(boneHelpers);

            if (intersects.length > 0) {
                const selectedBone = intersects[0].object.userData.targetBone;
                transformControl.attach(selectedBone);
            } else {
                // If clicked off a bone helper, check if user hit the gizmo itself
                const hitsGizmo = raycaster.intersectObjects(transformControl.children, true);
                if (hitsGizmo.length === 0) {
                    transformControl.detach();
                }
            }
        });

        // --- Window Layout Adjustments ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Render Loop & Math Physics ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const time = clock.getElapsedTime();
            orbit.update();

            // Math-driven Procedural Jiggle / Wave Physics
            physicsBones.forEach(pb => {
                // Skips processing if the user is actively manipulating this specific joint
                if (transformControl.object === pb.bone) return; 

                // Elegant subtle idle physics (wind/breathing sway simulation)
                const waveX = Math.sin(time * pb.speed) * 0.03;
                const waveZ = Math.cos(time * (pb.speed * 0.9)) * 0.03;

                // Smoothly spring back/interpolate towards base orientation
                pb.bone.rotation.x += (pb.baseRotation.x + waveX - pb.bone.rotation.x) * pb.stiffness;
                pb.bone.rotation.z += (pb.baseRotation.z + waveZ - pb.bone.rotation.z) * pb.stiffness;
            });

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
